<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>👀 ?</title>

<style>
body {
    background-color: #1a1a1a;
    margin: 0;
    overflow: hidden;
}

/* Osterei */
#egg {
    position: absolute;
    width: 10vw;          /* responsive Größe */
    max-width: 160px;
    min-width: 80px;
    height: auto;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.3s;
    opacity: 0.8;
}

#egg:hover {
    transform: scale(1.2);
    opacity: 1;
}
</style>
</head>
<body>

<img id="egg" src="bilder/s11728_easter_elegant_vector_decor_isolated_on_white_backgrou_832f0ebb-2223-4a05-a85f-e0ef085eab4a_1-removebg-preview_11zon.png">

<script>
const egg = document.getElementById("egg");

// zufällige Position
function moveEgg() {
    const maxX = window.innerWidth - egg.offsetWidth;
    const maxY = window.innerHeight - egg.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    egg.style.left = x + "px";
    egg.style.top = y + "px";
}

// Startposition nach Laden
window.onload = moveEgg;

// bewegt sich alle 2 Sekunden
setInterval(moveEgg, 2000);

// 😈 Bonus: Ei weicht Maus aus
document.addEventListener("mousemove", (e) => {
    const rect = egg.getBoundingClientRect();
    const distX = e.clientX - (rect.left + rect.width / 2);
    const distY = e.clientY - (rect.top + rect.height / 2);

    const distance = Math.sqrt(distX * distX + distY * distY);

    if (distance < 120) { // wenn Maus nah ist
        moveEgg();
    }
});

// Klick → echte Seite
egg.addEventListener("click", () => {
    window.location.href = "ostern.html"; // wichtig: klein!
});
</script>

</body>
</html>
