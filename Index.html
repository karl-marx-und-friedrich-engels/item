<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>👀 Finde das Ei...</title>

<style>
body {
    background: radial-gradient(circle, #222, #000);
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Score Anzeige */
#score {
    position: fixed;
    top: 15px;
    left: 20px;
    font-size: 20px;
    color: white;
}

/* Osterei */
#egg {
    position: absolute;
    width: 10vw;
    max-width: 150px;
    min-width: 70px;
    height: auto;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.5);
    transition: transform 0.2s, opacity 0.4s;
}

#egg.show {
    opacity: 0.9;
    transform: scale(1);
}

#egg:hover {
    transform: scale(1.2);
}

/* Klick Effekt */
.spark {
    position: absolute;
    width: 10px;
    height: 10px;
    background: yellow;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 0.6s forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>
</head>
<body>

<div id="score">🥚 Gefunden: 0</div>

<img id="egg" src="bilder/s11728_easter_elegant_vector_decor_isolated_on_white_backgrou_832f0ebb-2223-4a05-a85f-e0ef085eab4a_1-removebg-preview_11zon.png">

<script>
const egg = document.getElementById("egg");
const scoreDisplay = document.getElementById("score");

let score = 0;
let speed = 2000;

// zufällige Position
function moveEgg() {
    const maxX = window.innerWidth - egg.offsetWidth;
    const maxY = window.innerHeight - egg.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    egg.style.left = x + "px";
    egg.style.top = y + "px";
}

// Spawn Animation
function showEgg() {
    moveEgg();
    egg.classList.add("show");
}

// Explosion Effekt
function createEffect(x, y) {
    for (let i = 0; i < 10; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.style.left = x + "px";
        spark.style.top = y + "px";

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 80;

        spark.style.setProperty("--x", Math.cos(angle) * distance + "px");
        spark.style.setProperty("--y", Math.sin(angle) * distance + "px");

        document.body.appendChild(spark);

        setTimeout(() => spark.remove(), 600);
    }
}

// Maus ausweichen 😈
document.addEventListener("mousemove", (e) => {
    const rect = egg.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 120) {
        moveEgg();
    }
});

// Klick
egg.addEventListener("click", (e) => {
    score++;
    scoreDisplay.textContent = "🥚 Gefunden: " + score;

    createEffect(e.clientX, e.clientY);
    moveEgg();

    // wird schneller
    speed = Math.max(600, speed - 150);

    // nach 5 Treffern → echte Seite
    if (score >= 5) {
        document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>🎉 Gefunden!</h1>";
        setTimeout(() => {
            window.location.href = "ostern.html";
        }, 1200);
    }
});

// Bewegung mit steigender Schwierigkeit
function loop() {
    moveEgg();
    setTimeout(loop, speed);
}

// Start
window.onload = () => {
    showEgg();
    loop();
};
</script>

</body>
</html>
