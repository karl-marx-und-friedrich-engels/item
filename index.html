<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minecraft Projektmanager</title>

<link rel="icon" href="bilder/f/Spyglass_(item)_JE3_BE1.png">

<style>

body{
    margin:0;
    padding:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

#header{
    margin-top:40px;
}

#logo{
    width:120px;
    height:120px;
}

h1{
    margin-top:20px;
    margin-bottom:40px;
}

.container{
    width:700px;
    margin:auto;
}

.card{
    background:#222;
    border:1px solid #444;
    border-radius:10px;
    padding:25px;
    margin-bottom:20px;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    background:#333;
}

.card h2{
    margin-top:0;
}

.footer{
    margin-top:50px;
    color:#888;
    font-size:14px;
}

</style>

</head>

<body>

<div id="header">

<img id="logo" src="bilder/resized_1024_clock_00.png">

<h1>Minecraft Projektmanager</h1>

</div>

<div class="container">

<div class="card" onclick="location.href='material.html'">
<h2>📦 Materiallisten</h2>

<p>
Alle aktiven Bauprojekte öffnen.
</p>

</div>

<div class="card" onclick="location.href='blackboard.html'">
<h2>📝 Blackboard</h2>

<p>
Ideen, Bilder und allgemeine Notizen.
</p>

</div>

<div class="card" onclick="location.href='waypoints.html'">
<h2>📍 Waypoints</h2>

<p>
Alle gespeicherten Koordinaten.
</p>

</div>

</div>

<div class="footer">

Minecraft Projektmanager

</div>

<script>

const logo=document.getElementById("logo");

const frames=64;

const images=[];

for(let i=0;i<frames;i++){

    const img=new Image();

    img.src="bilder/resized_1024_clock_"+String(i).padStart(2,"0")+".png";

    images.push(img);

}

let current=0;

setInterval(()=>{

    logo.src=images[current].src;

    current=(current+1)%frames;

},50);

</script>

</body>
</html>
