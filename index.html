<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Projekte</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    margin: 0;
    padding: 0;
}
#container {
    max-width: 1200px;
    margin: auto;
    background: #2a2a2a;
    padding: 20px;
    border-radius: 8px;
}
h1 {
    text-align: center;
    margin-bottom: 10px;
}
#menuToggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 24px;
}
#menu {
    display: none;
    position: absolute;
    top: 60px;
    right: 20px;
    background: #333;
    border-radius: 6px;
    overflow: hidden;
    z-index: 10;
}
#menu button {
    display: block;
    width: 150px;
    background: #444;
    color: #fff;
    border: none;
    padding: 10px;
    text-align: left;
    cursor: pointer;
}
#menu button:hover {
    background: #555;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
th, td {
    padding: 8px;
    text-align: center;
}
th {
    background: #333;
}
tr:nth-child(even) { background-color: #2c2c2c; }
tr:nth-child(odd) { background-color: #262626; }
tr.checked {
    background-color: #2a4d2a !important;
}
input[type="checkbox"] {
    width: 20px;
    height: 20px;
}
#progressContainer {
    background-color: #444;
    border-radius: 6px;
    margin: 10px 0;
    height: 25px;
    width: 100%;
}
#progressBar {
    height: 25px;
    width: 0%;
    background-color: #00aa55;
    border-radius: 6px;
    text-align: center;
    line-height: 25px;
    color: white;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="container">
<h1>Materialliste</h1>

<!-- Drei Striche Menü -->
<div id="menuToggle">&#9776;</div>
<div id="menu">
    <button onclick="showSection('materials')">Materialliste</button>
    <button onclick="showSection('waypoints')">Waypoints</button>
</div>

<!-- Fortschrittsbalken -->
<div id="progressContainer">
    <div id="progressBar">0%</div>
</div>

<!-- Materialliste -->
<div id="materialsSection">
    <table>
        <thead>
            <tr>
                <th>✓</th>
                <th>Item</th>
                <th>Total</th>
                <th>Stacks</th>
            </tr>
        </thead>
        <tbody id="materialList"></tbody>
    </table>
</div>

<!-- Waypoints -->
<div id="waypointsSection" style="display:none;">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>X</th>
                <th>Y</th>
                <th>Z</th>
                <th>Copy</th>
            </tr>
        </thead>
        <tbody id="waypointsList"></tbody>
    </table>
</div>
</div>

<script>
// Menü-Logik
const menuToggle = document.getElementById('menuToggle');
const menu = document.getElementById('menu');
menuToggle.onclick = () => menu.style.display = menu.style.display === 'block' ? 'none' : 'block';

function showSection(section){
    document.getElementById('materialsSection').style.display = section==='materials' ? 'block' : 'none';
    document.getElementById('waypointsSection').style.display = section==='waypoints' ? 'block' : 'none';
    menu.style.display = 'none';
}

// Materialliste laden
async function loadMaterialList() {
    const res = await fetch('material_list_2026-03-29_16.54.28.txt');
    const text = await res.text();
    const lines = text.split("\n").filter(l => l.includes("|") && !l.startsWith("+"));
    const tbody = document.getElementById('materialList');
    let totalMaterials = 0, collectedMaterials = 0;

    lines.forEach(line => {
        const parts = line.split("|").map(p => p.trim()).filter(p=>p);
        if(parts.length<2) return;
        const name = parts[0];
        const total = parseInt(parts[1]);
        totalMaterials += total;
        collectedMaterials += 0; // Checkboxes starten alle ungecheckt

        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="checkbox" onchange="updateProgress()"></td>
                        <td>${name}</td>
                        <td>${total}</td>
                        <td>${Math.floor(total/64) + (total%64? " + " + (total%64) : "")}</td>`;
        tbody.appendChild(tr);
    });
}

// Fortschritt berechnen
function updateProgress(){
    const rows = document.querySelectorAll('#materialList tr');
    let total = 0, checked = 0;
    rows.forEach(r => {
        const totalValue = parseInt(r.cells[2].innerText);
        total += totalValue;
        if(r.querySelector('input[type="checkbox"]').checked){
            checked += totalValue;
            r.classList.add('checked');
        } else {
            r.classList.remove('checked');
        }
    });
    const percent = total? Math.round((checked/total)*100):0;
    const bar = document.getElementById('progressBar');
    bar.style.width = percent+'%';
    bar.textContent = percent+'%';
}

// Waypoints laden
async function loadWaypoints() {
    const res = await fetch('waypoints.txt');
    const text = await res.text();
    const lines = text.split("\n").filter(l=>l.trim() && !l.startsWith("#"));
    const tbody = document.getElementById('waypointsList');
    tbody.innerHTML = '';

    lines.forEach(line => {
        const parts = line.split("|").map(p=>p.trim());
        if(parts.length<4) return;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${parts[0]}</td>
                        <td>${parts[1]}</td>
                        <td>${parts[2]}</td>
                        <td>${parts[3]}</td>
                        <td><button onclick="copyCoords('${parts[1]}','${parts[2]}','${parts[3]}')">Copy</button></td>`;
        tbody.appendChild(tr);
    });
}

function copyCoords(x,y,z){
    navigator.clipboard.writeText(`${x}, ${y}, ${z}`);
    alert('Koordinaten kopiert: '+x+', '+y+', '+z);
}

// Initialisierung
loadMaterialList();
loadWaypoints();
</script>

</body>
</html>
