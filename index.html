<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Latmetica Materialliste mit Minecraft-Icons</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    padding: 20px;
  }
  h1 {
    text-align: center;
  }
  #container {
    max-width: 1100px;
    margin: auto;
    background: #2a2a2a;
    padding: 20px;
    border-radius: 8px;
  }
  textarea {
    width: 100%;
    height: 150px;
    background: #111;
    color: #0f0;
    padding: 10px;
    font-family: monospace;
    border: 1px solid #444;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  input[type="file"] {
    margin-bottom: 10px;
  }
  button {
    background-color: #00aaff;
    border: none;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 20px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    table-layout: fixed;
  }
  th, td {
    padding: 8px;
    border-bottom: 1px solid #444;
    text-align: center;
    word-wrap: break-word;
  }
  th {
    background-color: #333;
  }
  img {
    width: 32px;
    height: 32px;
  }
</style>
</head>
<body>
<div id="container">
  <h1>Latmetica Materialliste</h1>
  <textarea id="materialInput" placeholder="Materialliste hier einfügen..."></textarea><br>
  <input type="file" id="fileInput"><br>
  <button onclick="convertList()">Umwandeln</button>

  <table>
    <thead>
      <tr>
        <th>Bild</th>
        <th>Item</th>
        <th>Total</th>
        <th>Stacks</th>
      </tr>
    </thead>
    <tbody id="output"></tbody>
  </table>
</div>

<script>
const placeholder = "https://via.placeholder.com/32?text=?";

// Beispiel-Mapping deutsch → Fandom PNG URLs
const itemImageMap = {
  "Stein": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/87/Stone_JE3_BE3.png",
  "Fichtenholzbretter": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/1/10/Spruce_Planks_JE3_BE3.png",
  "Eichenholzbretter": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3b/Oak_Planks_JE3_BE3.png",
  "Eisentür": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3f/Iron_Door_JE3_BE3.png",
  "Truhe": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/8a/Chest_%28item%29.png",
  "Laterne": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/f/fb/Lantern_%28item%29.png",
  "Ofen": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/0/0b/Furnace_%28item%29.png",
  "Leiter": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/7/70/Ladder_JE3_BE3.png"
  // weitere Items hier ergänzen
};

function getIconURL(name) {
  return itemImageMap[name] || placeholder;
}

function getStacks(total) {
  const stacks = Math.floor(total / 64);
  const rest = total % 64;
  if (stacks === 0) return rest + " Blöcke";
  if (rest === 0) return stacks + " Stacks";
  return stacks + " Stacks + " + rest + " Blöcke";
}

function parseLine(line) {
  if (!line.includes("|")) return null;
  const parts = line.split("|").map(p => p.trim()).filter(p => p);
  if (parts.length < 2) return null;
  const name = parts[0];
  const total = parseInt(parts[1]);
  if (isNaN(total)) return null;
  return { name, total };
}

function convertList() {
  const file = document.getElementById("fileInput").files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => processMaterialList(e.target.result);
    reader.readAsText(file);
  } else {
    processMaterialList(document.getElementById("materialInput").value);
  }
}

function processMaterialList(text) {
  const lines = text.split("\n");
  const tbody = document.getElementById("output");
  tbody.innerHTML = "";
  lines.forEach(line => {
    const item = parseLine(line);
    if (!item) return;
    const imgURL = getIconURL(item.name);
    const row = document.createElement("tr");
    row.innerHTML = `
      <td><img src="${imgURL}" alt="${item.name}"></td>
      <td>${item.name}</td>
      <td>${item.total}</td>
      <td>${getStacks(item.total)}</td>
    `;
    tbody.appendChild(row);
  });
}
</script>
</body>
</html>
