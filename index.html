<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Latmetica Materialliste</title>
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
#container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
h1 { text-align: center; }
textarea { width: 100%; height: 150px; padding: 10px; font-family: monospace; margin-bottom: 10px; }
input[type=file] { margin-top: 10px; }
button { padding: 8px 16px; margin-top: 10px; cursor: pointer; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #eee; position: sticky; top: 0; }
tbody tr:nth-child(even) { background: #fafafa; }
img { width: 32px; height: 32px; }
</style>
</head>
<body>
<div id="container">
<h1>Latmetica Materialliste</h1>
<textarea id="materialInput" placeholder="Materialliste hier einfügen..."></textarea>
<br>
<input type="file" id="fileInput">
<button onclick="convertList()">Umwandeln</button>

<table id="resultTable">
  <thead>
    <tr>
      <th>Bild</th>
      <th>Item</th>
      <th>Total</th>
      <th>Stacks</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<script>
function parseLine(line) {
    // Zeilenformat: | Item | Total | ... |
    const regex = /^\|\s*(.+?)\s*\|\s*(\d+)/;
    const match = line.match(regex);
    if(!match) return null;
    return {
        name: match[1].trim(),
        total: parseInt(match[2],10)
    };
}

function calculateStacks(total) {
    const stacks = Math.floor(total / 64);
    const blocks = total % 64;
    return stacks + (blocks > 0 ? ` + ${blocks} Block${blocks>1?'e':''}` : '');
}

// Lokale Bilder im Ordner /images/
function getImageURL(itemName) {
    const fileName = itemName.toLowerCase()
        .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue')
        .replace(/ß/g,'ss').replace(/\s+/g,'_') + '.png';
    return `images/${fileName}`;
}

function convertList() {
    const textArea = document.getElementById('materialInput');
    const fileInput = document.getElementById('fileInput');

    function processText(text) {
        const lines = text.split('\n');
        const tbody = document.querySelector('#resultTable tbody');
        tbody.innerHTML = '';

        lines.forEach(line => {
            const parsed = parseLine(line);
            if(parsed) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${getImageURL(parsed.name)}" alt="${parsed.name}"></td>
                    <td>${parsed.name}</td>
                    <td>${parsed.total}</td>
                    <td>${calculateStacks(parsed.total)}</td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    if(fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = e => processText(e.target.result);
        reader.readAsText(fileInput.files[0]);
    } else {
        processText(textArea.value);
    }
}
</script>
</body>
</html>
