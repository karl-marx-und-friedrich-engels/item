<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>
<link rel="icon" href="bilder/Knowledge_Book_JE2.png">
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
    margin: 0;
    text-align: center;
}
#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
#logo {
    width: 80px;
    height: 80px;
}
#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}
#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    min-width: 160px;
}
#menu a {
    padding: 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid #444;
}
#menu a:hover {
    background: #444;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}
th {
    background-color: #222;
}
tbody tr:nth-child(odd) {
    background-color: #2b2b2b;
}
tbody tr:nth-child(even) {
    background-color: #3a3a3a;
}
tr:hover {
    background-color: #505050;
}
td.checkbox-cell {
    width: 40px;
}
tr.selected:nth-child(odd) {
    background-color: #006600;
}
tr.selected:nth-child(even) {
    background-color: #00aa00;
}
button.copy-btn {
    padding: 4px 8px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #007700;
    color: white;
}
button.copy-btn:hover {
    background-color: #00aa00;
}
#serverStatus {
    margin-bottom: 20px;
    font-size: 1.1em;
}
#progressBarContainer {
    width: 80%;
    height: 20px;
    background-color: #444;
    border-radius: 10px;
    margin: 0 auto 20px;
    overflow: hidden;
}
#progressBar {
    height: 100%;
    background-color: #00aa00;
    width: 0%;
    transition: width 0.5s;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Materialliste</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="serverStatus">Serverstatus wird geladen...</div>

<div id="progressBarContainer">
    <div id="progressBar"></div>
</div>

<div id="material" style="display:block;">
<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<script>
// ==========================
// MENU
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
function showProject(projectFile, projectName){
    loadProject(projectFile, projectName);
    document.getElementById('material').style.display = 'block';
}

// ==========================
// CLOCK ANIMATION
// ==========================
const logo = document.getElementById("logo");
const frames = 64;
const images = [];
for (let i = 0; i < frames; i++) {
    const img = new Image();
    img.src = `bilder/resized_1024_clock_${String(i).padStart(2,'0')}.png`;
    images.push(img);
}
let current = 0;
setInterval(() => {
    logo.src = images[current].src;
    current = (current + 1) % frames;
}, 50); // 20 FPS

// ==========================
// HELPER
// ==========================
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;
    if(stacks === 0) return rest + " Blöcke";
    if(rest === 0) return stacks + " Stacks";
    return stacks + " Stacks + " + rest;
}
function parseLine(line){
    line = line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts = line.split('|').map(p => p.trim()).filter(p => p);
    if(parts.length < 2) return null;
    const name = parts[0];
    const total = parseInt(parts[1].replace(/\s+/g, ''));
    if(isNaN(total)) return null;
    return {name, total};
}

// ==========================
// LOAD ACTIVE PROJECTS
// ==========================
fetch('projects_status.txt')
.then(res => res.text())
.then(statusText => {
    const lines = statusText.split('\n');
    const menu = document.getElementById('menu');
    const activeProjects = [];
    lines.forEach(line => {
        const [proj, val] = line.split(':');
        if(val && val.trim() === '1'){
            activeProjects.push(proj.trim());
        }
    });
    // Build menu
    activeProjects.forEach((proj, index) => {
        const a = document.createElement('a');
        a.href = "#";
        a.textContent = proj;
        a.onclick = () => showProject(`projekt_${index+1}.txt`, proj);
        menu.appendChild(a);
    });
    // Load first active project automatically
    if(activeProjects.length > 0){
        showProject(`projekt_1.txt`, activeProjects[0]);
    }
});

// ==========================
// LOAD PROJECT FILE
// ==========================
function loadProject(file, projectName){
    fetch(file)
    .then(res => res.text())
    .then(text => {
        const output = document.getElementById("output");
        output.innerHTML = '';
        document.getElementById('projectTitle').textContent = projectName;

        const sections = text.split('Originalliste:');
        const matLines = sections[0].split('\n');
        const origLines = sections[1] ? sections[1].split('\n') : [];

        let totalMat = 0, totalOrig = 0;

        const matItems = {};
        matLines.forEach(line => {
            const item = parseLine(line);
            if(item){
                matItems[item.name] = item.total;
                totalMat += item.total;
            }
        });
        const origItems = {};
        origLines.forEach(line => {
            const item = parseLine(line);
            if(item){
                origItems[item.name] = item.total;
                totalOrig += item.total;
            }
        });

        // Progress %
        const progress = totalOrig > 0 ? Math.floor((totalMat/totalOrig)*100) : 0;
        document.getElementById('progressBar').style.width = progress + '%';

        // Fill table
        for(const name in matItems){
            const total = matItems[name];
            const row = document.createElement("tr");
            const nameCell = document.createElement("td");
            nameCell.textContent = name;
            const totalCell = document.createElement("td");
            totalCell.textContent = total;
            const stacksCell = document.createElement("td");
            stacksCell.textContent = getStacks(total);
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.style.width = "24px";
            checkbox.style.height = "24px";
            checkbox.addEventListener('change', () => {
                row.classList.toggle('selected', checkbox.checked);
            });
            const checkboxCell = document.createElement("td");
            checkboxCell.className = "checkbox-cell";
            checkboxCell.appendChild(checkbox);

            row.appendChild(nameCell);
            row.appendChild(totalCell);
            row.appendChild(stacksCell);
            row.appendChild(checkboxCell);

            output.appendChild(row);
        }

    })
    .catch(err => console.error("Fehler beim Laden des Projekts:", err));
}

// ==========================
// SERVER STATUS
// ==========================
const serverStatusDiv = document.getElementById("serverStatus");
fetch('https://api.mcsrvstat.us/2/Season_4.exaroton.me')
.then(res => res.json())
.then(data => {
    if(!data.online){
        serverStatusDiv.textContent = "Server offline";
        return;
    }
    let players = data.players && data.players.list ? data.players.list.join(', ') : 'Keine Spieler sichtbar';
    serverStatusDiv.innerHTML = `
        Server online! <br>
        Spieler: ${data.players ? data.players.online : 0}/${data.players ? data.players.max : '?'}<br>
        Version: ${data.version}<br>
        Online Spieler: ${players}
    `;
})
.catch(err => serverStatusDiv.textContent = "Fehler beim Abrufen des Serverstatus");

</script>
</body>
</html>
