<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>
<link rel="icon" href="bilder/Knowledge_Book_JE2.png">
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
    margin: 0;
    text-align: center;
}
#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
#logo {
    width: 80px;
    height: 80px;
}
#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}
#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    min-width: 180px;
}
#menu a {
    padding: 8px 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid #444;
    display: block;
}
#menu a:hover {
    background: #444;
}
.menu-sub {
    font-style: italic;
    margin-left: 15px;
    font-size: 0.9em;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}
th {
    background-color: #222;
}
tbody tr:nth-child(odd) {
    background-color: #2b2b2b;
}
tbody tr:nth-child(even) {
    background-color: #3a3a3a;
}
tr:hover {
    background-color: #505050;
}
td.checkbox-cell {
    width: 40px;
}
tr.selected:nth-child(odd) {
    background-color: #006600;
}
tr.selected:nth-child(even) {
    background-color: #00aa00;
}
button.copy-btn {
    padding: 4px 8px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #007700;
    color: white;
}
button.copy-btn:hover {
    background-color: #00aa00;
}
.progressContainer {
    width: 80%;
    height: 24px;
    background-color: #444;
    border-radius: 12px;
    margin: 10px auto;
    position: relative;
    overflow: hidden;
}
.progressBar {
    height: 100%;
    width: 0%;
    background-color: #00aa00;
    border-radius: 12px 0 0 12px;
    transition: width 0.5s;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    left: 0;
    line-height: 24px;
    color: #fff;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Materialliste</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="progressSection">
    <div class="progressContainer">
        <div id="blockProgress" class="progressBar"></div>
        <div id="blockProgressText" class="progressText">0% Blöcke</div>
    </div>
    <div class="progressContainer">
        <div id="itemProgress" class="progressBar"></div>
        <div id="itemProgressText" class="progressText">0% Items</div>
    </div>
</div>

<div id="material">
<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<div id="waypointsSection" style="display:none;">
<table>
<thead>
<tr>
<th>Name</th>
<th>X</th>
<th>Y</th>
<th>Z</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="waypointsTable"></tbody>
</table>
</div>

<script>
// MENU
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
function showSection(section, projectFile=null){
    document.getElementById("material").style.display = section==='material'?'block':'none';
    document.getElementById("progressSection").style.display = section==='material'?'block':'none';
    document.getElementById("waypointsSection").style.display = section==='waypoints'?'block':'none';
    if(section==='material' && projectFile) loadProject(projectFile);
    if(section==='waypoints') loadWaypoints();
}

// CLOCK
const logo = document.getElementById("logo");
const frames = 64;
const images = [];
for(let i=0;i<frames;i++){
    const img = new Image();
    img.src=`bilder/resized_1024_clock_${String(i).padStart(2,'0')}.png`;
    images.push(img);
}
let current=0;
setInterval(()=>{logo.src=images[current].src;current=(current+1)%frames;},50);

// HELPERS
function getStacks(total){
    const stacks=Math.floor(total/64);
    const rest=total%64;
    if(stacks===0) return rest+" Blöcke";
    if(rest===0) return stacks+" Stacks";
    return stacks+" Stacks + "+rest;
}
function parseLine(line){
    line=line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item')) return null;
    const parts=line.split('|').map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;
    return {name:parts[0], total:parseInt(parts[1])};
}

// LOAD PROJECTS
fetch('projects_status.txt').then(r=>r.text()).then(text=>{
    const menu=document.getElementById('menu');
    const lines=text.split('\n');

    const material=document.createElement('a');
    material.textContent="Materialliste";
    menu.appendChild(material);

    const wp=document.createElement('a');
    wp.textContent="Waypoints";
    wp.onclick=()=>showSection('waypoints');
    menu.appendChild(wp);

    lines.forEach((line,i)=>{
        if(line.includes(':1')){
            fetch(`projekt_${i+1}.txt`).then(r=>r.text()).then(t=>{
                const name=t.split('\n').find(l=>l.startsWith('Name:')).split(':')[1].trim();
                const a=document.createElement('a');
                a.textContent=name;
                a.className="menu-sub";
                a.onclick=()=>showSection('material',`projekt_${i+1}.txt`);
                menu.insertBefore(a,wp);
            });
        }
    });
});

// LOAD PROJECT
function loadProject(file){
    fetch(file).then(r=>r.text()).then(text=>{
        const output=document.getElementById("output");
        output.innerHTML='';

        const name=text.split('\n').find(l=>l.startsWith('Name:')).split(':')[1].trim();
        document.getElementById("projectTitle").textContent=name;

        text.split('\n').forEach(l=>{
            const item=parseLine(l);
            if(!item) return;
            const row=document.createElement("tr");
            row.innerHTML=`<td>${item.name}</td><td>${item.total}</td><td>${getStacks(item.total)}</td><td></td>`;
            output.appendChild(row);
        });
    });
}

// LOAD WAYPOINTS
function loadWaypoints(){
    const table=document.getElementById("waypointsTable");
    table.innerHTML='';
    fetch('waypoints.txt').then(r=>r.text()).then(text=>{
        text.split('\n').forEach(l=>{
            if(!l.trim()) return;
            const p=l.split(',');
            const row=document.createElement('tr');
            row.innerHTML=`
                <td>${p[0]}</td>
                <td>${p[1]}</td>
                <td>${p[2]}</td>
                <td>${p[3]}</td>
                <td><button class="copy-btn" onclick="navigator.clipboard.writeText('${p[1]},${p[2]},${p[3]}')">Kopieren</button></td>
            `;
            table.appendChild(row);
        });
        document.getElementById("projectTitle").textContent="Waypoints";
    });
}
</script>

</body>
</html>
