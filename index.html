<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minecraft Projektübersicht</title>
<style>
body { font-family: Arial; background:#1e1e1e; color:#ddd; margin:0; }
header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#111; }
#titleLeft { display:flex; align-items:center; gap:10px; font-weight:bold; font-size:18px; }
#clock, #logo { width:40px; height:40px; }
#menuRight { display:flex; flex-direction:column; cursor:pointer; gap:5px; }
.menuBar { width:25px; height:3px; background:#ddd; }
#content { padding:20px; }
#materialWrapper, #waypointsWrapper { display:none; }
#materialWrapper.active, #waypointsWrapper.active { display:block; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #444; padding:5px; text-align:left; }
tr:nth-child(even){ background:#2a2a2a; }
tr:nth-child(odd){ background:#202020; }
tr.checked{ background:#336633 !important; }
.copyBtn{ cursor:pointer; padding:2px 5px; background:#444; color:#ddd; border-radius:3px; }
#progressBarContainer{ background:#333; width:100%; height:20px; margin-top:10px; }
#progressBar{ background:#33aa33; height:100%; width:0%; }
</style>
</head>
<body>

<header>
  <div id="titleLeft">
    <img id="clock" src="" alt="Uhr">
    <img id="logo" src="Knowledge_Book_JE2.png" alt="Logo">
    <span id="currentTitle">Materialliste</span>
  </div>
  <div id="menuRight" title="Ansicht wechseln">
    <div class="menuBar"></div>
    <div class="menuBar"></div>
    <div class="menuBar"></div>
  </div>
</header>

<div id="content">
  <div id="materialWrapper" class="active">
    <div id="projectStatus"></div>
    <table id="materialTable"></table>
    <div id="progressBarContainer">
      <div id="progressBar"></div>
    </div>
  </div>
  <div id="waypointsWrapper">
    <table id="waypointsTable"></table>
  </div>
</div>

<script>
let clockImages=[], clockIndex=0;
for(let i=0;i<=63;i++){ clockImages.push(`resized_1024_clock_${String(i).padStart(2,'0')}.png`); }
function updateClock(){ document.getElementById('clock').src=clockImages[clockIndex]; clockIndex=(clockIndex+1)%clockImages.length; setTimeout(updateClock,150); }
updateClock();

let showingMaterial=true;
document.getElementById("menuRight").onclick=function(){
  showingMaterial=!showingMaterial;
  document.getElementById("materialWrapper").classList.toggle("active",showingMaterial);
  document.getElementById("waypointsWrapper").classList.toggle("active",!showingMaterial);
  document.getElementById("currentTitle").textContent=showingMaterial?"Materialliste":"Waypoints";
};

async function loadMaterial(){
  try{
    let statusText=(await fetch("projects_status.txt")).text();
    let resp=await fetch("projekt1.txt"); let text=await resp.text();
    let lines=text.split("\n");
    let table=document.getElementById("materialTable"); table.innerHTML="<tr><th>Item</th><th>Total</th><th>Missing</th><th>Available</th><th>Abhaken</th></tr>";
    lines.forEach(line=>{
      if(line.startsWith("|")){
        let cols=line.split("|").map(x=>x.trim()).filter(x=>x);
        if(cols.length>=4){ let tr=document.createElement("tr"); tr.innerHTML=`<td>${cols[0]}</td><td>${cols[1]}</td><td>${cols[2]}</td><td>${cols[3]}</td><td><input type="checkbox" class="itemCheck"></td>`; table.appendChild(tr); }
      }
    });
  } catch(e){ console.error("Fehler beim Laden der Materialliste:",e); }
}

async function loadWaypoints(){
  try{
    let resp=await fetch("waypoints.txt"); let text=await resp.text();
    let lines=text.split("\n"); let table=document.getElementById("waypointsTable"); table.innerHTML="<tr><th>Name</th><th>X</th><th>Y</th><th>Z</th><th>Copy</th></tr>";
    lines.forEach(line=>{
      if(!line.trim()) return;
      let [name,x,y,z]=line.split(",");
      let tr=document.createElement("tr");
      tr.innerHTML=`<td>${name}</td><td>${x}</td><td>${y}</td><td>${z}</td><td><span class="copyBtn">Copy</span></td>`;
      table.appendChild(tr);
    });
    table.querySelectorAll(".copyBtn").forEach(btn=>{btn.onclick=function(){let row=btn.parentElement.parentElement; navigator.clipboard.writeText(`${row.children[1].textContent},${row.children[2].textContent},${row.children[3].textContent}`);}});
  } catch(e){ console.error("Fehler beim Laden der Waypoints:",e); }
}

loadMaterial();
loadWaypoints();
</script>

</body>
</html>
