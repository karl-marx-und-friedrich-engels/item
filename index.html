<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minecraft Planer & Dashboard</title>
<link rel="icon" href="bilder/f/Spyglass_(item)_JE3_BE1.png">
<style>
:root {
    --bg-color: #141414;
    --card-bg: #1f1f1f;
    --card-hover: #2a2a2a;
    --mc-green: #38873c;
    --mc-green-hover: #4caf50;
    --border-color: #333;
    --text-color: #f5f5f5;
    --text-muted: #aaa;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    padding: 30px 20px;
    margin: 0;
    text-align: center;
}

#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
}

#logo {
    width: 70px;
    height: 70px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

#menuButton {
    position: fixed;
    top: 20px;
    right: 25px;
    font-size: 28px;
    cursor: pointer;
    z-index: 1000;
    background: var(--card-bg);
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    transition: background 0.2s;
}
#menuButton:hover {
    background: var(--card-hover);
}

#menu {
    position: fixed;
    top: 70px;
    right: 25px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    min-width: 200px;
    z-index: 999;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    overflow: hidden;
}
#menu a {
    padding: 12px 15px;
    text-decoration: none;
    color: var(--text-color);
    border-bottom: 1px solid var(--border-color);
    display: block;
    text-align: left;
    font-size: 0.95em;
    transition: background 0.2s;
}
#menu a:hover {
    background: var(--card-hover);
}
.menu-sub {
    font-style: italic;
    margin-left: 15px;
    font-size: 0.85em;
    color: var(--text-muted);
}

/* Zurück Button auf den Unterseiten */
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 25px;
    transition: all 0.2s;
}
.back-btn:hover {
    background: var(--card-hover);
    transform: translateX(-3px);
}

/* Schickere Tabellen */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
    background: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
th, td {
    padding: 12px 15px;
    border-bottom: 1px solid var(--border-color);
    text-align: center;
}
th {
    background-color: #151515;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.85em;
    letter-spacing: 1px;
}
tbody tr:nth-child(odd) { background-color: #1f1f1f; }
tbody tr:nth-child(even) { background-color: #252525; }
tr:hover { background-color: #2e2e2e; }

td.checkbox-cell { width: 50px; }
tr.selected:nth-child(odd), tr.selected:nth-child(even) {
    background-color: rgba(56, 135, 60, 0.25);
    color: #81c784;
}

button.copy-btn {
    padding: 6px 12px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: var(--mc-green);
    color: white;
    font-weight: bold;
    transition: background 0.2s;
}
button.copy-btn:hover { background-color: var(--mc-green-hover); }

/* Fortschrittsbalken */
.progressContainer {
    width: 80%;
    height: 26px;
    background-color: #111;
    border-radius: 20px;
    margin: 12px auto;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border-color);
}
.progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #38873c, #4caf50);
    border-radius: 20px;
    transition: width 0.6s ease;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    left: 0;
    line-height: 26px;
    color: #fff;
    font-weight: bold;
    font-size: 0.9em;
    pointer-events: none;
}

/* Aufpoliertes Dashboard (Ohne Symbole) */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    max-width: 900px;
    margin: 40px auto;
}
.dash-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 35px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.15em;
    font-weight: bold;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: all 0.25s ease;
}
.dash-card:hover {
    background: var(--mc-green);
    border-color: var(--mc-green-hover);
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(76, 175, 80, 0.2);
}

/* Aufpoliertes Blackboard */
.blackboard-container {
    max-width: 650px;
    margin: 10px auto;
    background: #182218; /* Dunkelgrüner Kreide-Look */
    border: 8px solid #3e2723; /* Schöner Holzrahmen */
    padding: 25px;
    border-radius: 6px;
    text-align: left;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.8);
    box-sizing: border-box;
}
.blackboard-title {
    color: #bcaaa4;
    text-align: center;
    margin-top: 0;
    font-family: 'Courier New', Courier, monospace;
    border-bottom: 2px dashed #3e2723;
    padding-bottom: 10px;
}
.task-input-section {
    display: flex;
    gap: 12px;
    margin-bottom: 25px;
}
.task-input-section input {
    flex: 1;
    padding: 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid #3e2723;
    color: #fff;
    border-radius: 4px;
    font-size: 1em;
}
.task-input-section button {
    padding: 12px 24px;
    background: var(--mc-green);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
.task-input-section button:hover { background: var(--mc-green-hover); }
.task-list { list-style: none; padding: 0; margin: 0; }
.task-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 5px;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1em;
    color: #e0e0e0;
}
.task-item button {
    background: #d32f2f;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: sans-serif;
    font-size: 0.85em;
}

/* NEU: Bilder-Galerie Grid */
.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: 20px auto;
}
.image-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    overflow: hidden;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.image-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 6px;
    background: #111;
}
.image-number {
    margin-top: 8px;
    font-weight: bold;
    color: var(--mc-green-hover);
    font-size: 1.1em;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Minecraft Zentrale</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="dashboardSection" style="display:block;">
    <h2>Willkommen! Wähle eine Funktion aus:</h2>
    <div class="dashboard-grid">
        <div class="dash-card" onclick="openFirstProject()">Materiallisten</div>
        <div class="dash-card" onclick="showSection('waypoints')">Waypoints</div>
        <div class="dash-card" onclick="showSection('blackboard')">Blackboard (Aufgaben)</div>
        <div class="dash-card" onclick="showSection('gallery')">Bilder-Galerie</div>
    </div>
</div>

<div id="progressSection" style="display:none;">
    <div class="progressContainer">
        <div id="blockProgress" class="progressBar"></div>
        <div id="blockProgressText" class="progressText">0% Blöcke</div>
    </div>
    <div class="progressContainer">
        <div id="itemProgress" class="progressBar"></div>
        <div id="itemProgressText" class="progressText">0% Items</div>
    </div>
</div>

<div id="material" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <table>
    <thead>
    <tr>
    <th>Item</th>
    <th>Total</th>
    <th>Stacks</th>
    <th></th>
    </tr>
    </thead>
    <tbody id="output"></tbody>
    </table>
</div>

<div id="waypointsSection" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <table>
    <thead>
    <tr>
    <th>Name</th>
    <th>X</th>
    <th>Y</th>
    <th>Z</th>
    <th>Aktion</th>
    </tr>
    </thead>
    <tbody id="waypointsTable"></tbody>
    </table>
</div>

<div id="blackboardSection" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <div class="blackboard-container">
        <h2 class="blackboard-title">=== BLACKBOARD ===</h2>
        <div class="task-input-section">
            <input type="text" id="taskInput" placeholder="Neue Aufgabe eingeben...">
            <button onclick="addTask()">Hinzufügen</button>
        </div>
        <ul id="taskList" class="task-list"></ul>
    </div>
</div>

<div id="gallerySection" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <h2>Eingefügte Baublöcke / Bilder</h2>
    <div id="galleryGrid" class="image-grid">
        </div>
</div>

<script>
let firstProjectFile = null;

// HIER EINFACH DIE ANZAHL DER BILDER EINTRAGEN, DIE DU HAST!
// Wenn du 5 Bilder im Ordner hast, einfach auf 5 ändern.
const ANZAHL_BILDER = 6; 

// ==========================
// MENU & SEKTIONS-STEUERUNG
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function showSection(section, projectFile=null){
    document.getElementById("dashboardSection").style.display = section==='dashboard'?'block':'none';
    document.getElementById("material").style.display = section==='material'?'block':'none';
    document.getElementById("progressSection").style.display = section==='material'?'block':'none';
    document.getElementById("waypointsSection").style.display = section==='waypoints'?'block':'none';
    document.getElementById("blackboardSection").style.display = section==='blackboard'?'block':'none';
    document.getElementById("gallerySection").style.display = section==='gallery'?'block':'none';
    
    if(section==='dashboard') document.getElementById('projectTitle').textContent = "Minecraft Zentrale";
    if(section==='material' && projectFile) loadProject(projectFile);
    if(section==='waypoints') loadWaypoints();
    if(section==='blackboard') document.getElementById('projectTitle').textContent = "Blackboard";
    if(section==='gallery') {
        document.getElementById('projectTitle').textContent = "Bilder-Galerie";
        loadGallery();
    }
    
    document.getElementById("menu").style.display = "none";
}

function openFirstProject() {
    if(firstProjectFile) showSection('material', firstProjectFile);
    else showSection('material');
}

// ==========================
// BILDER-GALERIE LOGIK
// ==========================
function loadGallery() {
    const grid = document.getElementById("galleryGrid");
    grid.innerHTML = ""; // Leeren
    
    // Generiert automatisch die Karten von 1 bis ANZAHL_BILDER
    for(let i = 1; i <= ANZAHL_BILDER; i++) {
        const card = document.createElement("div");
        card.className = "image-card";
        
        // Ordnerstruktur: bilder/blackboard/1.png usw.
        card.innerHTML = `
            <img src="bilder/blackboard/${i}.png" alt="Block ${i}" onerror="this.src='bilder/resized_1024_clock_00.png';">
            <div class="image-number">Bild #${i}</div>
        `;
        grid.appendChild(card);
    }
}

// ==========================
// BLACKBOARD LOGIK
// ==========================
function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if(!text) return;
    
    const ul = document.getElementById("taskList");
    const li = document.createElement("li");
    li.className = "task-item";
    
    li.innerHTML = `<span>➢ ${text}</span> <button onclick="this.parentElement.remove()">Löschen</button>`;
    ul.appendChild(li);
    input.value = "";
}

// ==========================
// CLOCK ANIMATION
// ==========================
const logo = document.getElementById("logo");
const frames = 64;
const images = [];
for(let i=0;i<frames;i++){
    const img = new Image();
    img.src=`bilder/resized_1024_clock_${String(i).padStart(2,'0')}.png`;
    images.push(img);
}
let current=0;
setInterval(()=>{logo.src=images[current].src;current=(current+1)%frames;},50);

// ==========================
// HELPERS
// ==========================
function getStacks(total){
    const stacks=Math.floor(total/64);
    const rest=total%64;
    if(stacks===0) return rest+" Blöcke";
    if(rest===0) return stacks+" Stacks";
    return stacks+" Stacks + "+rest;
}
function parseLine(line){
    line=line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts=line.split('|').map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;
    const name=parts[0];
    const total=parseInt(parts[1].replace(/\s+/g,''));
    if(isNaN(total)) return null;
    return {name,total};
}

// ==========================
// LOAD PROJECTS & MENU
// ==========================
fetch('projects_status.txt').then(res=>res.text()).then(statusText=>{
    const lines=statusText.split('\n');
    const menu=document.getElementById('menu');

    const dashLi=document.createElement('a'); dashLi.href="#"; dashLi.textContent="🏠 Hauptseite"; dashLi.onclick=()=>showSection('dashboard');
    menu.appendChild(dashLi);

    const materialLi=document.createElement('a'); materialLi.href="#"; materialLi.textContent="📋 Materialliste";
    materialLi.onclick=()=> openFirstProject();
    menu.appendChild(materialLi);

    const wpLi=document.createElement('a'); wpLi.href="#"; wpLi.textContent="📍 Waypoints"; wpLi.onclick=()=>showSection('waypoints');
    menu.appendChild(wpLi);

    const bbLi=document.createElement('a'); bbLi.href="#"; bbLi.textContent="📝 Blackboard"; bbLi.onclick=()=>showSection('blackboard');
    menu.appendChild(bbLi);

    const galLi=document.createElement('a'); galLi.href="#"; galLi.textContent="🖼 Bilder-Galerie"; galLi.onclick=()=>showSection('gallery');
    menu.appendChild(galLi);

    const activeProjects=[];
    lines.forEach((line,index)=>{
        const [proj,val]=line.split(':');
        if(val && val.trim()==='1') activeProjects.push({file:`projekt_${index+1}.txt`});
    });

    if(activeProjects.length > 0) {
        firstProjectFile = activeProjects[0].file;
    }

    activeProjects.forEach(p=>{
        fetch(p.file).then(res=>res.text()).then(txt=>{
            const nameLine=txt.split('\n').find(l=>l.startsWith('Name:'));
            const projectName=nameLine?nameLine.split(':')[1].trim():"Projekt";
            const a=document.createElement('a');
            a.href="#"; a.textContent=projectName;
            a.className="menu-sub";
            a.onclick=()=>showSection('material',p.file);
            menu.insertBefore(a, wpLi);
        });
    });

    showSection('dashboard');
});

// ==========================
// LOAD PROJECT FILE
// ==========================
function loadProject(file){
    fetch(file).then(res=>res.text()).then(text=>{
        const output=document.getElementById("output");
        output.innerHTML='';

        const nameLine=text.split('\n').find(l=>l.startsWith('Name:'));
        const projectName=nameLine?nameLine.split(':')[1].trim():"Unbekanntes Projekt";
        document.getElementById('projectTitle').textContent=projectName;

        const sections=text.split('Originalliste:');
        const matLines=sections[0].split('\n');
        const origLines=sections[1]?sections[1].split('\n'):[];

        let totalMatBlocks=0,totalOrigBlocks=0,totalMatItems=0,totalOrigItems=0;
        const matItems={},origItems={};

        matLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ matItems[item.name]=item.total; totalMatBlocks+=item.total; totalMatItems++; }
        });
        origLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ origItems[item.name]=item.total; totalOrigBlocks+=item.total; totalOrigItems++; }
        });

        const blockProgress=totalOrigBlocks>0?Math.floor(((totalOrigBlocks-totalMatBlocks)/totalOrigBlocks)*100):0;
        const itemProgress=totalOrigItems>0?Math.floor(((totalOrigItems-totalMatItems)/totalOrigItems)*100):0;

        document.getElementById('blockProgress').style.width=blockProgress+'%';
        document.getElementById('blockProgressText').textContent=blockProgress+'% Blöcke';
        document.getElementById('itemProgress').style.width=itemProgress+'%';
        document.getElementById('itemProgressText').textContent=itemProgress+'% Items';

        for(const name in matItems){
            const total=matItems[name];
            const row=document.createElement("tr");
            const nameCell=document.createElement("td"); nameCell.textContent=name;
            const totalCell=document.createElement("td"); totalCell.textContent=total;
            const stacksCell=document.createElement("td"); stacksCell.textContent=getStacks(total);
            const checkbox=document.createElement("input"); checkbox.type="checkbox"; checkbox.style.width="24px"; checkbox.style.height="24px";
            checkbox.addEventListener('change',()=>row.classList.toggle('selected', checkbox.checked));
            const checkboxCell=document.createElement("td"); checkboxCell.className="checkbox-cell"; checkboxCell.appendChild(checkbox);
            row.appendChild(nameCell); row.appendChild(totalCell); row.appendChild(stacksCell); row.appendChild(checkboxCell);
            output.appendChild(row);
        }
    }).catch(err=>console.error("Fehler beim Laden des Projekts:", err));
}

// ==========================
// LOAD WAYPOINTS
// ==========================
function loadWaypoints(){
    const table=document.getElementById("waypointsTable");
    table.innerHTML=''; 
    fetch('waypoints.txt').then(res=>res.text()).then(text=>{
        const lines=text.split('\n');
        lines.forEach(l=>{
            if(!l.trim()) return;
            const parts=l.split(',');
            const row=document.createElement('tr');
            parts.forEach((v,i)=>{
                const td=document.createElement('td'); td.textContent=v.trim(); row.appendChild(td);
            });
            const actionTd=document.createElement('td');
            const copyBtn=document.createElement('button'); copyBtn.textContent="Kopieren"; copyBtn.className="copy-btn";
            copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(parts.slice(1).join(', ')); copyBtn.textContent='✔'; setTimeout(()=>copyBtn.textContent='Kopieren',1000);});
            actionTd.appendChild(copyBtn);
            row.appendChild(actionTd);
            table.appendChild(row);
        });
        document.getElementById('projectTitle').textContent="Waypoints";
    }).catch(err=>console.error("Fehler beim Laden der Waypoints:",err));
}
</script>
</body>
</html>
