<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minecraft Dashboard</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    margin: 0;
    padding: 0;
}

#header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #2a2a2a;
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

#logo {
    height: 40px;
}

#menuButton {
    font-size: 24px;
    cursor: pointer;
}

#menuDropdown {
    display: none;
    position: absolute;
    right: 20px;
    top: 60px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

#menuDropdown button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #444;
    color: #fff;
    cursor: pointer;
    text-align: left;
}

#menuDropdown button:hover {
    background: #555;
}

#container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 8px;
    text-align: left;
    border-bottom: 1px solid #444;
}

th {
    background: #333;
}

tr:nth-child(even) {background: #2b2b2b;}
tr:nth-child(odd) {background: #3a3a3a;}

.progress-bar-container {
    background: #444;
    border-radius: 5px;
    height: 20px;
    width: 100%;
    margin-top: 5px;
}

.progress-bar {
    height: 100%;
    border-radius: 5px;
    background: #00aa55;
    width: 0%;
    transition: width 0.5s;
}

.hidden {display: none;}
</style>
</head>
<body>

<div id="header">
    <img id="logo" src="Knowledge_Book_JE2.png" alt="Logo">
    <div id="menuButton">&#9776;</div>
    <div id="menuDropdown">
        <button onclick="showSection('material')">Materialien</button>
        <button onclick="showSection('waypoints')">Waypoints</button>
    </div>
</div>

<div id="container">
    <div id="materialSection">
        <h2>Projekt: <span id="projektName"></span></h2>
        <div class="progress-bar-container">
            <div class="progress-bar" id="projektProgress"></div>
        </div>
        <table id="materialTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Total</th>
                    <th>Original</th>
                    <th>Stacks</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div style="margin-top:10px;">
            <label>Projekt anzeigen: 
                <input type="checkbox" id="projectActiveToggle">
            </label>
        </div>
    </div>

    <div id="waypointSection" class="hidden">
        <h2>Waypoints</h2>
        <table id="waypointTable">
            <thead>
                <tr><th>Name</th><th>X</th><th>Y</th><th>Z</th><th>Copy</th></tr>
            </thead>
            <tbody>
                <tr><td>Unbewohnte Base</td><td>525</td><td>172</td><td>-855</td><td><button onclick="copyCoords(525,172,-855)">Copy</button></td></tr>
                <tr><td>F</td><td>760</td><td>88</td><td>-2043</td><td><button onclick="copyCoords(760,88,-2043)">Copy</button></td></tr>
                <tr><td>Home</td><td>642</td><td>79</td><td>-2088</td><td><button onclick="copyCoords(642,79,-2088)">Copy</button></td></tr>
                <tr><td>Bothell Farm</td><td>-231</td><td>83</td><td>2423</td><td><button onclick="copyCoords(-231,83,2423)">Copy</button></td></tr>
                <tr><td>Endportal</td><td>-474</td><td>-20</td><td>2251</td><td><button onclick="copyCoords(-474,-20,2251)">Copy</button></td></tr>
                <tr><td>Totemfarm</td><td>-474</td><td>62</td><td>-1621</td><td><button onclick="copyCoords(-474,62,-1621)">Copy</button></td></tr>
                <tr><td>Gunpowder Farm</td><td>-2538</td><td>190</td><td>13096</td><td><button onclick="copyCoords(-2538,190,13096)">Copy</button></td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// ---------------------------
// Menü
// ---------------------------
const menuButton = document.getElementById('menuButton');
const menuDropdown = document.getElementById('menuDropdown');
menuButton.onclick = () => { menuDropdown.style.display = menuDropdown.style.display==='block' ? 'none' : 'block'; }

function showSection(section) {
    document.getElementById('materialSection').classList.add('hidden');
    document.getElementById('waypointSection').classList.add('hidden');
    if(section==='material') document.getElementById('materialSection').classList.remove('hidden');
    if(section==='waypoints') document.getElementById('waypointSection').classList.remove('hidden');
    menuDropdown.style.display = 'none';
}

// ---------------------------
// Materialliste laden
// ---------------------------
const projektFiles = ['projekt_1.txt','projekt_2.txt','projekt_3.txt','projekt_4.txt','projekt_5.txt'];
let currentProjektIndex = 0;

function loadProjekt(index) {
    fetch(projektFiles[index])
        .then(resp => resp.text())
        .then(text => {
            parseProjekt(text);
        })
        .catch(err => console.error('Projektdatei nicht gefunden:', projektFiles[index]));
}

// Parse Projektdatei
function parseProjekt(text){
    const lines = text.split('\n').map(l => l.trim()).filter(l=>l);
    let projektName = '';
    let materialListe = [];
    let originalListe = [];
    let active = 1;
    let section = '';

    for(const line of lines){
        if(line.toLowerCase().startsWith('name:')) projektName = line.split(':')[1].trim();
        else if(line.toLowerCase().startsWith('active:')) active = parseInt(line.split(':')[1].trim());
        else if(line.toLowerCase().startsWith('materialliste:')) section='material';
        else if(line.toLowerCase().startsWith('originalliste:')) section='origin';
        else {
            const parts = line.split('|').map(p=>p.trim());
            if(parts.length===2){
                const item = {name:parts[0], total:parseInt(parts[1])};
                if(section==='material') materialListe.push(item);
                else if(section==='origin') originalListe.push(item);
            }
        }
    }

    // Anzeige
    document.getElementById('projektName').textContent = projektName;
    document.getElementById('projectActiveToggle').checked = active===1;
    updateMaterialTable(materialListe, originalListe);
}

// ---------------------------
// Tabelle aktualisieren
// ---------------------------
function updateMaterialTable(materialListe, originalListe){
    const tbody = document.getElementById('materialTable').querySelector('tbody');
    tbody.innerHTML = '';
    let sumTotal=0, sumOrigin=0;

    materialListe.forEach((item,i)=>{
        const originTotal = originalListe[i] ? originalListe[i].total : 0;
        sumTotal += item.total;
        sumOrigin += originTotal;

        const row = document.createElement('tr');
        row.innerHTML = `<td>${item.name}</td><td>${item.total}</td><td>${originTotal}</td><td>${Math.floor(item.total/64)} Stacks</td>`;
        tbody.appendChild(row);
    });

    const progress = sumOrigin>0 ? (sumTotal/sumOrigin)*100 : 0;
    document.getElementById('projektProgress').style.width = progress+'%';
}

// ---------------------------
// Checkbox Active Toggle
// ---------------------------
document.getElementById('projectActiveToggle').addEventListener('change', e=>{
    // nur optisch, speichert nichts serverseitig
    e.target.checked ? console.log('Projekt aktiviert') : console.log('Projekt deaktiviert');
});

// ---------------------------
// Waypoints kopieren
// ---------------------------
function copyCoords(x,y,z){
    navigator.clipboard.writeText(`${x}, ${y}, ${z}`);
    alert('Koordinaten kopiert: '+x+','+y+','+z);
}

// ---------------------------
// Beim Laden Projekt 1
// ---------------------------
window.onload = ()=>{ loadProjekt(0); }

</script>
</body>
</html>
