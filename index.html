<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Latmetica Materialliste</title>
<style>
body {
  font-family: Arial;
  background: #1e1e1e;
  color: #fff;
  padding: 20px;
}
#container {
  max-width: 1100px;
  margin: auto;
  background: #2a2a2a;
  padding: 20px;
  border-radius: 10px;
}
textarea {
  width: 100%;
  height: 150px;
  background: #111;
  color: #0f0;
  padding: 10px;
  font-family: monospace;
}
button {
  margin-top: 10px;
  padding: 10px;
  background: #00aa55;
  border: none;
  color: white;
  cursor: pointer;
}
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #444;
  text-align: center;
}
th {
  background: #333;
}
img {
  width: 32px;
  height: 32px;
}
</style>
</head>
<body>
<div id="container">
<h1>Materialliste</h1>

<textarea id="materialInput" placeholder="Materialliste hier einfügen..."></textarea><br>
<input type="file" id="fileInput"><br>
<button onclick="convertList()">Umwandeln</button>

<table>
<thead>
<tr>
<th>Bild</th>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<script>
// Verhindert Spam von kaputten Bildern
const failedImages = new Set();

// Mapping für bekannte Items (deutsch → Minecraft-ID)
const itemMap = {
"Fichtenholzbretter":"spruce_planks",
"Stein":"stone",
"Steinziegel":"stone_bricks",
"Fichtenholztreppe":"spruce_stairs",
"Andesit":"andesite",
"Eichenholzbretter":"oak_planks",
"Bruchstein":"cobblestone",
"Ofen":"furnace",
"Truhe":"chest",
"Leiter":"ladder",
"Laterne":"lantern",
"Bücherregal":"bookshelf",
"Ziegelsteine":"brick",
"Ziegelstufe":"brick_stairs"
};

// Bild-URL holen, nur einmal pro fehlendem Item versuchen
function getImage(name){
    const id = itemMap[name];
    if(!id) return "https://via.placeholder.com/32?text=?";
    if(failedImages.has(id)) return "https://via.placeholder.com/32?text=?";
    return `https://mcasset.cloud/1.20/assets/minecraft/textures/item/${id}.png`;
}

// Stacks + Restblöcke berechnen
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;
    if(rest === 0) return stacks + " Stacks";
    if(stacks === 0) return rest + " Blöcke";
    return stacks + " Stacks + " + rest;
}

// Zeile parsen
function parseLine(line){
    if(!line.includes("|")) return null;
    const parts = line.split("|").map(p => p.trim()).filter(p => p);
    if(parts.length < 2) return null;
    const name = parts[0];
    const total = parseInt(parts[1]);
    if(isNaN(total)) return null;
    return { name, total };
}

// Hauptfunktion
function convertList(){
    function process(text){
        const lines = text.split("\n");
        const output = document.getElementById("output");
        output.innerHTML = "";

        lines.forEach(line=>{
            const item = parseLine(line);
            if(!item) return;

            const id = itemMap[item.name];

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>
                  <img src="${getImage(item.name)}"
                       onerror="
                        ${id ? `failedImages.add('${id}')` : ''}
                        this.onerror=null;
                        this.src='https://via.placeholder.com/32?text=?';
                       ">
                </td>
                <td>${item.name}</td>
                <td>${item.total}</td>
                <td>${getStacks(item.total)}</td>
            `;
            output.appendChild(row);
        });
    }

    const file = document.getElementById("fileInput").files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = e => process(e.target.result);
        reader.readAsText(file);
    } else {
        process(document.getElementById("materialInput").value);
    }
}
</script>
</body>
</html>
