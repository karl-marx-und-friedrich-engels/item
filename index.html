<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Minecraft Planer & Zentrale</title>
<link rel="icon" href="bilder/f/Spyglass_(item)_JE3_BE1.png">
<style>
:root {
    --bg-color: #1a1a1a;
    --card-bg: #222;
    --card-hover: #2e2e2e;
    --mc-green: #38873c;
    --mc-green-hover: #4caf50;
    --border-color: #444;
    --text-color: #fff;
    --text-muted: #aaa;
}

body {
    font-family: Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    padding: 20px;
    margin: 0;
    text-align: center;
}

#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

#logo {
    width: 80px;
    height: 80px;
}

#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}

#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    display: none;
    flex-direction: column;
    min-width: 180px;
    z-index: 999;
}
#menu a {
    padding: 8px 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid var(--border-color);
    display: block;
    text-align: left;
}
#menu a:hover {
    background: #444;
}
.menu-sub {
    font-style: italic;
    margin-left: 15px;
    font-size: 0.9em;
    color: var(--text-muted);
}

/* Zurück-Button für alle Unterseiten */
.back-btn {
    display: inline-block;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 20px;
    transition: background 0.2s;
}
.back-btn:hover {
    background: var(--card-hover);
}

/* Absolut einheitlicher Tabellen-Look für alle Sektionen */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}
th, td {
    padding: 12px 10px;
    border: 1px solid var(--border-color);
    text-align: center;
    vertical-align: middle;
}
th {
    background-color: #222;
    color: #fff;
}
tbody tr:nth-child(odd) { background-color: #2b2b2b; }
tbody tr:nth-child(even) { background-color: #3a3a3a; }
tr:hover { background-color: #505050; }

td.checkbox-cell { width: 40px; }
tr.selected:nth-child(odd) { background-color: #006600; }
tr.selected:nth-child(even) { background-color: #00aa00; }

button.copy-btn {
    padding: 4px 8px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: var(--mc-green);
    color: white;
}
button.copy-btn:hover { background-color: var(--mc-green-hover); }

/* Fortschrittsbalken */
.progressContainer {
    width: 80%;
    height: 24px;
    background-color: #444;
    border-radius: 12px;
    margin: 10px auto;
    position: relative;
    overflow: hidden;
}
.progressBar {
    height: 100%;
    width: 0%;
    background-color: #00aa00;
    border-radius: 12px 0 0 12px;
    transition: width 0.5s;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    left: 0;
    line-height: 24px;
    color: #fff;
    font-weight: bold;
    pointer-events: none;
}

/* Hauptseite Dashboard-Anordnung (Kacheln ohne Symbole) */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 800px;
    margin: 40px auto;
}
.dash-card {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    padding: 35px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.2em;
    font-weight: bold;
    transition: all 0.2s;
}
.dash-card:hover {
    background: var(--mc-green);
    border-color: #fff;
    transform: scale(1.03);
}

/* Bilder-Vorschau Container innerhalb der Blackboard-Tabelle */
.bb-image-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-start;
    margin-top: 10px;
}
.bb-image-container img {
    height: 80px;
    width: 120px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--border-color);
    background-color: #111;
    transition: transform 0.2s;
}
.bb-image-container img:hover {
    transform: scale(1.1);
    cursor: zoom-in;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Minecraft Zentrale</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="dashboardSection" style="display:block;">
    <h2>Willkommen! Wähle eine Übersicht aus:</h2>
    <div class="dashboard-grid">
        <div class="dash-card" onclick="openFirstProject()">Materiallisten</div>
        <div class="dash-card" onclick="showSection('waypoints')">Waypoints</div>
        <div class="dash-card" onclick="showSection('blackboard')">Blackboard</div>
    </div>
</div>

<div id="progressSection" style="display:none;">
    <div class="progressContainer">
        <div id="blockProgress" class="progressBar"></div>
        <div id="blockProgressText" class="progressText">0% Blöcke</div>
    </div>
    <div class="progressContainer">
        <div id="itemProgress" class="progressBar"></div>
        <div id="itemProgressText" class="progressText">0% Items</div>
    </div>
</div>

<div id="material" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <table>
    <thead>
    <tr>
    <th>Item</th>
    <th>Total</th>
    <th>Stacks</th>
    <th></th>
    </tr>
    </thead>
    <tbody id="output"></tbody>
    </table>
</div>

<div id="waypointsSection" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <table>
    <thead>
    <tr>
    <th>Name</th>
    <th>X</th>
    <th>Y</th>
    <th>Z</th>
    <th>Aktion</th>
    </tr>
    </thead>
    <tbody id="waypointsTable"></tbody>
    </table>
</div>

<div id="blackboardSection" style="display:none;">
    <button class="back-btn" onclick="showSection('dashboard')">← Zurück zur Hauptseite</button>
    <table>
    <thead>
    <tr>
    <th style="width: 80px;">Einheit</th>
    <th>Beschreibung & Zugehörige Bilder</th>
    </tr>
    </thead>
    <tbody id="blackboardTable"></tbody>
    </table>
</div>

<script>
let firstProjectFile = null;

// ==========================
// SEKTIONS-STEUERUNG
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function showSection(section, projectFile=null){
    document.getElementById("dashboardSection").style.display = section==='dashboard'?'block':'none';
    document.getElementById("material").style.display = section==='material'?'block':'none';
    document.getElementById("progressSection").style.display = section==='material'?'block':'none';
    document.getElementById("waypointsSection").style.display = section==='waypoints'?'block':'none';
    document.getElementById("blackboardSection").style.display = section==='blackboard'?'block':'none';
    
    if(section==='dashboard') {
        document.getElementById('projectTitle').textContent = "Minecraft Zentrale";
    }
    if(section==='material') {
        if(projectFile) loadProject(projectFile);
        else document.getElementById('projectTitle').textContent = "Materialliste";
    }
    if(section==='waypoints') loadWaypoints();
    if(section==='blackboard') loadBlackboard();
    
    document.getElementById("menu").style.display = "none";
}

function openFirstProject() {
    if(firstProjectFile) showSection('material', firstProjectFile);
    else showSection('material');
}

// ==========================
// BLACKBOARD LOGIK (Einheitliche Tabelle + Bild-Erkennung)
// ==========================
function loadBlackboard(){
    const table = document.getElementById("blackboardTable");
    table.innerHTML = '';
    
    fetch('blackboard.txt').then(res => res.text()).then(text => {
        const lines = text.split('\n');
        let counter = 1;
        
        lines.forEach(l => {
            if(!l.trim()) return;
            
            const row = document.createElement('tr');
            
            // Spalte 1: Nummerierung (#1, #2...)
            const numTd = document.createElement('td');
            numTd.innerHTML = `<strong>#${counter}</strong>`;
            
            // Spalte 2: Text + Bilder-Container
            const contentTd = document.createElement('td');
            contentTd.style.textAlign = "left";
            contentTd.style.padding = "15px";
            
            // Text-Element
            const textDiv = document.createElement('div');
            textDiv.textContent = l.trim();
            textDiv.style.fontWeight = "bold";
            textDiv.style.fontSize = "1.05em";
            contentTd.appendChild(textDiv);
            
            // Container für Bilder dieser Einheit
            const imgContainer = document.createElement('div');
            imgContainer.className = "bb-image-container";
            
            // Schleife prüft automatisch Bildnummern von 00 bis 19
            for(let j = 0; j <= 19; j++) {
                const imgNum = String(j).padStart(2, '0');
                const img = document.createElement('img');
                // Pfad z.B. bilder/blackboard/1.00.png
                img.src = `bilder/blackboard/${counter}.${imgNum}.png`;
                img.alt = `Bild ${counter}.${imgNum}`;
                
                // CRITICAL: Wenn das Bild lokal nicht existiert, wird es lautlos gelöscht!
                img.onerror = function() {
                    this.remove();
                };
                
                imgContainer.appendChild(img);
            }
            
            contentTd.appendChild(imgContainer);
            row.appendChild(numTd);
            row.appendChild(contentTd);
            table.appendChild(row);
            
            counter++;
        });
        document.getElementById('projectTitle').textContent = "Blackboard";
    }).catch(err => {
        console.error("Fehler beim Laden des Blackboards:", err);
        table.innerHTML = '<tr><td colspan="2">blackboard.txt konnte nicht geladen werden.</td></tr>';
    });
}

// ==========================
// CLOCK ANIMATION
// ==========================
const logo = document.getElementById("logo");
const frames = 64;
const images = [];
for(let i=0;i<frames;i++){
    const img = new Image();
    img.src=`bilder/resized_1024_clock_${String(i).padStart(2,'0')}.png`;
    images.push(img);
}
let current=0;
setInterval(()=>{logo.src=images[current].src;current=(current+1)%frames;},50);

// ==========================
// HELPERS
// ==========================
function getStacks(total){
    const stacks=Math.floor(total/64);
    const rest=total%64;
    if(stacks===0) return rest+" Blöcke";
    if(rest===0) return stacks+" Stacks";
    return stacks+" Stacks + "+rest;
}
function parseLine(line){
    line=line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts=line.split('|').map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;
    const name=parts[0];
    const total=parseInt(parts[1].replace(/\s+/g,''));
    if(isNaN(total)) return null;
    return {name,total};
}

// ==========================
// LOAD PROJECTS & MENU
// ==========================
fetch('projects_status.txt').then(res=>res.text()).then(statusText=>{
    const lines=statusText.split('\n');
    const menu=document.getElementById('menu');
    menu.innerHTML = '';

    const dashLi=document.createElement('a'); dashLi.href="#"; dashLi.textContent="🏠 Hauptseite"; dashLi.onclick=()=>showSection('dashboard');
    menu.appendChild(dashLi);

    const materialLi=document.createElement('a'); materialLi.href="#"; materialLi.textContent="📋 Materialliste";
    materialLi.onclick=()=> openFirstProject();
    menu.appendChild(materialLi);

    const projectSubContainer = document.createElement('div');
    menu.appendChild(projectSubContainer);

    const wpLi=document.createElement('a'); wpLi.href="#"; wpLi.textContent="📍 Waypoints"; wpLi.onclick=()=>showSection('waypoints');
    menu.appendChild(wpLi);

    const bbLi=document.createElement('a'); bbLi.href="#"; bbLi.textContent="📝 Blackboard"; bbLi.onclick=()=>showSection('blackboard');
    menu.appendChild(bbLi);

    const activeProjects=[];
    lines.forEach((line,index)=>{
        const [proj,val]=line.split(':');
        if(val && val.trim()==='1') activeProjects.push({file:`projekt_${index+1}.txt`, index: index});
    });

    if(activeProjects.length>0) {
        firstProjectFile = activeProjects[0].file;
    }

    activeProjects.forEach(p=>{
        fetch(p.file).then(res=>res.text()).then(txt=>{
            const nameLine=txt.split('\n').find(l=>l.startsWith('Name:'));
            const projectName=nameLine?nameLine.split(':')[1].trim():`Projekt ${p.index+1}`;
            const a=document.createElement('a');
            a.href="#"; a.textContent=projectName;
            a.className="menu-sub";
            a.setAttribute('data-index', p.index);
            a.onclick=()=>showSection('material',p.file);
            
            projectSubContainer.appendChild(a);
            
            Array.from(projectSubContainer.children)
                .sort((x, y) => parseInt(x.getAttribute('data-index')) - parseInt(y.getAttribute('data-index')))
                .forEach(node => projectSubContainer.appendChild(node));
        });
    });

    showSection('dashboard');
});

// ==========================
// LOAD PROJECT FILE
// ==========================
function loadProject(file){
    fetch(file).then(res=>res.text()).then(text=>{
        const output=document.getElementById("output");
        output.innerHTML='';

        const nameLine=text.split('\n').find(l=>l.startsWith('Name:'));
        const projectName=nameLine?nameLine.split(':')[1].trim():"Unbekanntes Projekt";
        document.getElementById('projectTitle').textContent=projectName;

        const sections=text.split('Originalliste:');
        const matLines=sections[0].split('\n');
        const origLines=sections[1]?sections[1].split('\n'):[];

        let totalMatBlocks=0,totalOrigBlocks=0,totalMatItems=0,totalOrigItems=0;
        const matItems={},origItems={};

        matLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ matItems[item.name]=item.total; totalMatBlocks+=item.total; totalMatItems++; }
        });
        origLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ origItems[item.name]=item.total; totalOrigBlocks+=item.total; totalOrigItems++; }
        });

        const blockProgress=totalOrigBlocks>0?Math.floor(((totalOrigBlocks-totalMatBlocks)/totalOrigBlocks)*100):0;
        const itemProgress=totalOrigItems>0?Math.floor(((totalOrigItems-totalMatItems)/totalOrigItems)*100):0;

        document.getElementById('blockProgress').style.width=blockProgress+'%';
        document.getElementById('blockProgressText').textContent=blockProgress+'% Blöcke';
        document.getElementById('itemProgress').style.width=itemProgress+'%';
        document.getElementById('itemProgressText').textContent=itemProgress+'% Items';

        for(const name in matItems){
            const total=matItems[name];
            const row=document.createElement("tr");
            const nameCell=document.createElement("td"); nameCell.textContent=name;
            const totalCell=document.createElement("td"); totalCell.textContent=total;
            const stacksCell=document.createElement("td"); stacksCell.textContent=getStacks(total);
            const checkbox=document.createElement("input"); checkbox.type="checkbox"; checkbox.style.width="24px"; checkbox.style.height="24px";
            checkbox.addEventListener('change',()=>row.classList.toggle('selected', checkbox.checked));
            const checkboxCell=document.createElement("td"); checkboxCell.className="checkbox-cell"; checkboxCell.appendChild(checkbox);
            row.appendChild(nameCell); row.appendChild(totalCell); row.appendChild(stacksCell); row.appendChild(checkboxCell);
            output.appendChild(row);
        }
    }).catch(err=>console.error("Fehler beim Laden des Projekts:", err));
}

// ==========================
// LOAD WAYPOINTS
// ==========================
function loadWaypoints(){
    const table=document.getElementById("waypointsTable");
    table.innerHTML=''; 
    fetch('waypoints.txt').then(res=>res.text()).then(text=>{
        const lines=text.split('\n');
        lines.forEach(l=>{
            if(!l.trim()) return;
            const parts=l.split(',');
            const row=document.createElement('tr');
            parts.forEach((v,i)=>{
                const td=document.createElement('td'); td.textContent=v.trim(); row.appendChild(td);
            });
            const actionTd=document.createElement('td');
            const copyBtn=document.createElement('button'); copyBtn.textContent="Kopieren"; copyBtn.className="copy-btn";
            copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(parts.slice(1).join(', ')); copyBtn.textContent='✔'; setTimeout(()=>copyBtn.textContent='Kopieren',1000);});
            actionTd.appendChild(copyBtn);
            row.appendChild(actionTd);
            table.appendChild(row);
        });
        document.getElementById('projectTitle').textContent="Waypoints";
    }).catch(err=>console.error("Fehler beim Laden der Waypoints:",err));
}
</script>
</body>
</html>
