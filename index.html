<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>
<link rel="icon" href="bilder/Knowledge_Book_JE2.png">
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
    margin: 0;
    text-align: center;
}
#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
#logo {
    width: 80px;
    height: 80px;
}
#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}
#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    min-width: 160px;
}
#menu a {
    padding: 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid #444;
}
#menu a:hover {
    background: #444;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}
th {
    background-color: #222;
}
tbody tr:nth-child(odd) {
    background-color: #2b2b2b;
}
tbody tr:nth-child(even) {
    background-color: #3a3a3a;
}
tr:hover {
    background-color: #505050;
}
td.checkbox-cell {
    width: 40px;
}
tr.selected:nth-child(odd) {
    background-color: #006600;
}
tr.selected:nth-child(even) {
    background-color: #00aa00;
}
button.copy-btn {
    padding: 4px 8px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #007700;
    color: white;
}
button.copy-btn:hover {
    background-color: #00aa00;
}
#serverStatus {
    margin-bottom: 20px;
    font-size: 1.1em;
}

/* Fortschrittsbalken */
.progressContainer {
    width: 80%;
    height: 24px;
    background-color: #444;
    border-radius: 12px;
    margin: 10px auto;
    position: relative;
    overflow: hidden;
}
.progressBar {
    height: 100%;
    width: 0%;
    background-color: #00aa00;
    border-radius: 12px 0 0 12px;
    transition: width 0.5s;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    left: 0;
    line-height: 24px;
    color: #fff;
    font-weight: bold;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Materialliste</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="serverStatus">Serverstatus wird geladen...</div>

<div id="progressSection" style="display:block;">
    <div class="progressContainer">
        <div id="blockProgress" class="progressBar"></div>
        <div id="blockProgressText" class="progressText">0% Blöcke</div>
    </div>
    <div class="progressContainer">
        <div id="itemProgress" class="progressBar"></div>
        <div id="itemProgressText" class="progressText">0% Items</div>
    </div>
</div>

<div id="material" style="display:block;">
<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<div id="waypoints" style="display:none;">
<h2>Waypoints</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>X</th>
<th>Y</th>
<th>Z</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="waypointsTable"></tbody>
</table>
</div>

<script>
// ==========================
// MENU
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
function showSection(section, projectFile=null){
    document.getElementById("material").style.display = section === 'material' ? 'block' : 'none';
    document.getElementById("waypoints").style.display = section === 'waypoints' ? 'block' : 'none';
    document.getElementById("progressSection").style.display = section === 'material' ? 'block' : 'none';
    if(section === 'material' && projectFile){
        loadProject(projectFile);
    } else if(section === 'waypoints'){
        document.getElementById("projectTitle").textContent = "Waypoints";
    }
}

// ==========================
// CLOCK ANIMATION
// ==========================
const logo = document.getElementById("logo");
const frames = 64;
const images = [];
for (let i = 0; i < frames; i++) {
    const img = new Image();
    img.src = `bilder/resized_1024_clock_${String(i).padStart(2,'0')}.png`;
    images.push(img);
}
let current = 0;
setInterval(() => {
    logo.src = images[current].src;
    current = (current + 1) % frames;
}, 50);

// ==========================
// HELPERS
// ==========================
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;
    if(stacks === 0) return rest + " Blöcke";
    if(rest === 0) return stacks + " Stacks";
    return stacks + " Stacks + " + rest;
}
function parseLine(line){
    line = line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts = line.split('|').map(p => p.trim()).filter(p => p);
    if(parts.length < 2) return null;
    const name = parts[0];
    const total = parseInt(parts[1].replace(/\s+/g, ''));
    if(isNaN(total)) return null;
    return {name, total};
}

// ==========================
// LOAD PROJECTS
// ==========================
fetch('projects_status.txt')
.then(res => res.text())
.then(statusText => {
    const lines = statusText.split('\n');
    const menu = document.getElementById('menu');
    const activeProjects = [];
    lines.forEach((line,index) => {
        const [proj, val] = line.split(':');
        if(val && val.trim() === '1'){
            activeProjects.push({menuName: proj.trim(), file:`projekt_${index+1}.txt`});
        }
    });
    activeProjects.forEach(p => {
        const a = document.createElement('a');
        a.href="#";
        a.textContent = p.menuName;
        a.onclick = ()=>showSection('material', p.file);
        menu.appendChild(a);
    });
    const wp = document.createElement('a');
    wp.href="#"; wp.textContent="Waypoints"; wp.onclick = ()=>showSection('waypoints');
    menu.appendChild(wp);

    if(activeProjects.length>0) showSection('material', activeProjects[0].file);
    else showSection('waypoints');
});

// ==========================
// LOAD PROJECT FILE
// ==========================
function loadProject(file){
    fetch(file)
    .then(res=>res.text())
    .then(text=>{
        const output = document.getElementById("output");
        output.innerHTML='';

        // Projektname aus der Datei auslesen
        const nameLine = text.split('\n').find(l=>l.startsWith('Name:'));
        const projectName = nameLine ? nameLine.split(':')[1].trim() : "Unbekanntes Projekt";
        document.getElementById('projectTitle').textContent = projectName;

        const sections = text.split('Originalliste:');
        const matLines = sections[0].split('\n');
        const origLines = sections[1] ? sections[1].split('\n') : [];

        let totalMatBlocks=0, totalOrigBlocks=0, totalMatItems=0, totalOrigItems=0;
        const matItems={}, origItems={};

        matLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ matItems[item.name]=item.total; totalMatBlocks+=item.total; totalMatItems++; }
        });
        origLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ origItems[item.name]=item.total; totalOrigBlocks+=item.total; totalOrigItems++; }
        });

        const blockProgress = totalOrigBlocks>0?Math.floor(((totalOrigBlocks-totalMatBlocks)/totalOrigBlocks)*100):0;
        const itemProgress = totalOrigItems>0?Math.floor(((totalOrigItems-totalMatItems)/totalOrigItems)*100):0;

        document.getElementById('blockProgress').style.width=blockProgress+'%';
        document.getElementById('blockProgressText').textContent=blockProgress+'% Blöcke';
        document.getElementById('itemProgress').style.width=itemProgress+'%';
        document.getElementById('itemProgressText').textContent=itemProgress+'% Items';

        for(const name in matItems){
            const total=matItems[name];
            const row=document.createElement("tr");
            const nameCell=document.createElement("td"); nameCell.textContent=name;
            const totalCell=document.createElement("td"); totalCell.textContent=total;
            const stacksCell=document.createElement("td"); stacksCell.textContent=getStacks(total);
            const checkbox=document.createElement("input"); checkbox.type="checkbox"; checkbox.style.width="24px"; checkbox.style.height="24px";
            checkbox.addEventListener('change',()=>row.classList.toggle('selected', checkbox.checked));
            const checkboxCell=document.createElement("td"); checkboxCell.className="checkbox-cell"; checkboxCell.appendChild(checkbox);
            row.appendChild(nameCell); row.appendChild(totalCell); row.appendChild(stacksCell); row.appendChild(checkboxCell);
            output.appendChild(row);
        }
    })
    .catch(err=>console.error("Fehler beim Laden des Projekts:", err));
}

// ==========================
// WAYPOINTS
// ==========================
const waypointsTable = document.getElementById("waypointsTable");
fetch('waypoints.txt')
.then(res=>res.text())
.then(text=>{
    const lines = text.split('\n');
    lines.forEach(line=>{
        const [name,x,y,z]=line.split(',').map(s=>s.trim());
        if(!name) return;
        const row=document.createElement("tr");
        [name,x,y,z].forEach(val=>{ const td=document.createElement("td"); td.textContent=val; row.appendChild(td); });
        const actionTd=document.createElement("td");
        const copyBtn=document.createElement("button"); copyBtn.textContent="Kopieren"; copyBtn.className="copy-btn";
        copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(`${x}, ${y}, ${z}`); copyBtn.textContent="✔"; setTimeout(()=>copyBtn.textContent="Kopieren",1000);});
        actionTd.appendChild(copyBtn); row.appendChild(actionTd);
        waypointsTable.appendChild(row);
    });
});

// ==========================
// SERVER STATUS
// ==========================
const serverStatusDiv = document.getElementById("serverStatus");
fetch('https://api.mcsrvstat.us/2/Season_4.exaroton.me')
.then(res => res.json())
.then(data => {
    if(!data.online){ serverStatusDiv.textContent="Server offline"; return; }
    let players = data.players && data.players.list ? data.players.list.join(', ') : 'Keine Spieler sichtbar';
    serverStatusDiv.innerHTML = `Server online! <br> Spieler: ${data.players ? data.players.online : 0}/${data.players ? data.players.max : '?'}<br> Version: ${data.version}<br> Online Spieler: ${players}`;
})
.catch(err => serverStatusDiv.textContent = "Fehler beim Abrufen des Serverstatus");
</script>
</body>
</html>
