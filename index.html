<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
    margin: 0;
    text-align: center;
}
#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
#logo {
    width: 80px;
    height: 80px;
}
#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}
#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid #444;
    display: none;
    flex-direction: column;
}
#menu a {
    padding: 8px;
    color: white;
    text-decoration: none;
}
#menu a:hover {
    background: #444;
}

table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
}
tr.selected {
    background-color: #00aa00 !important;
}

.progressContainer {
    width: 80%;
    height: 24px;
    background-color: #444;
    margin: 10px auto;
    position: relative;
}
.progressBar {
    height: 100%;
    width: 0%;
    background-color: #00aa00;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    line-height: 24px;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Materialliste</h1>
</div>

<div class="progressContainer">
    <div id="blockProgress" class="progressBar"></div>
    <div id="blockProgressText" class="progressText">0%</div>
</div>

<div class="progressContainer">
    <div id="itemProgress" class="progressBar"></div>
    <div id="itemProgressText" class="progressText">0%</div>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>

<script>

// ==========================
// MENU
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

// ==========================
// HELPERS
// ==========================
function getStacks(total){
    const stacks=Math.floor(total/64);
    const rest=total%64;
    if(stacks===0) return rest;
    if(rest===0) return stacks+" Stacks";
    return stacks+" Stacks + "+rest;
}

function parseLine(line){
    line=line.trim();
    if(!line || line.startsWith('+') || line.includes('Item')) return null;

    const parts=line.split('|').map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;

    const name=parts[0];
    const total=parseInt(parts[1]);

    if(isNaN(total)) return null;

    return {name,total};
}

// ==========================
// LOAD PROJECT
// ==========================
function loadProject(file){
    fetch(file).then(res=>res.text()).then(text=>{

        const output=document.getElementById("output");
        output.innerHTML='';

        const nameLine=text.split('\n').find(l=>l.startsWith('Name:'));
        const projectName=nameLine?nameLine.split(':')[1].trim():"Projekt";
        document.getElementById('projectTitle').textContent=projectName;

        const sections=text.split('Originalliste:');
        const matLines=sections[0].split('\n');
        const origLines=sections[1].split('\n');

        let totalMatBlocks=0,totalOrigBlocks=0;
        let totalMatItems=0,totalOrigItems=0;

        matLines.forEach(l=>{
            const item=parseLine(l);
            if(item){
                totalMatBlocks+=item.total;
                totalMatItems++;
            }
        });

        origLines.forEach(l=>{
            const item=parseLine(l);
            if(item){
                totalOrigBlocks+=item.total;
                totalOrigItems++;
            }
        });

        // ==========================
        // FERTIG ERKENNUNG
        // ==========================
        const isFinished = totalMatItems === 0;

        let blockProgress = 0;
        let itemProgress = 0;

        if (isFinished) {
            blockProgress = 100;
            itemProgress = 100;
        } else {
            blockProgress = Math.floor(((totalOrigBlocks - totalMatBlocks) / totalOrigBlocks) * 100);
            itemProgress = Math.floor(((totalOrigItems - totalMatItems) / totalOrigItems) * 100);
        }

        document.getElementById('blockProgress').style.width=blockProgress+'%';
        document.getElementById('itemProgress').style.width=itemProgress+'%';

        if (isFinished) {
            document.getElementById('blockProgressText').textContent="100% – Alle Materialien gesammelt 🎉";
            document.getElementById('itemProgressText').textContent="Projekt fertig ✅";
            document.getElementById('projectTitle').textContent += " ✅";

            const row=document.createElement("tr");
            const cell=document.createElement("td");
            cell.colSpan=4;
            cell.textContent="🎉 Alles gesammelt!";
            row.appendChild(cell);
            output.appendChild(row);

            return;
        } else {
            document.getElementById('blockProgressText').textContent=blockProgress+"%";
            document.getElementById('itemProgressText').textContent=itemProgress+"%";
        }

        // ==========================
        // ITEMS RENDERN
        // ==========================
        matLines.forEach(l=>{
            const item=parseLine(l);
            if(!item) return;

            const row=document.createElement("tr");

            const nameCell=document.createElement("td");
            nameCell.textContent=item.name;

            const totalCell=document.createElement("td");
            totalCell.textContent=item.total;

            const stacksCell=document.createElement("td");
            stacksCell.textContent=getStacks(item.total);

            const checkbox=document.createElement("input");
            checkbox.type="checkbox";

            checkbox.addEventListener('change',()=>{
                row.classList.toggle('selected', checkbox.checked);
            });

            const checkboxCell=document.createElement("td");
            checkboxCell.appendChild(checkbox);

            row.appendChild(nameCell);
            row.appendChild(totalCell);
            row.appendChild(stacksCell);
            row.appendChild(checkboxCell);

            output.appendChild(row);
        });

    });
}

// ==========================
// START
// ==========================
loadProject("projekt_1.txt");

</script>
</body>
</html>
