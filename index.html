<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Latmetica Materialliste</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1e1e1e;
  color: #fff;
  margin: 0;
  padding: 20px;
}

#container {
  max-width: 1100px;
  margin: auto;
  background: #2a2a2a;
  padding: 20px;
  border-radius: 10px;
}

h1 { text-align: center; }

textarea {
  width: 100%;
  height: 150px;
  background: #111;
  color: #0f0;
  padding: 10px;
  border-radius: 5px;
  font-family: monospace;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #00aa55;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #444;
  text-align: center;
}

th {
  background: #333;
  position: sticky;
  top: 0;
}

tr:hover { background: #333; }

img {
  width: 32px;
  height: 32px;
}
</style>
</head>

<body>

<div id="container">
<h1>Latmetica Materialliste</h1>

<textarea id="materialInput" placeholder="Materialliste hier einfügen..."></textarea>
<br>
<input type="file" id="fileInput">
<br>
<button onclick="convertList()">Umwandeln</button>

<table>
<thead>
<tr>
<th>Bild</th>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<script>

// Mapping (kannst du erweitern)
const itemMap = {
"Fichtenholzbretter":"spruce_planks",
"Stein":"stone",
"Steinziegel":"stone_bricks",
"Fichtenholztreppe":"spruce_stairs",
"Andesit":"andesite",
"Eichenholzbretter":"oak_planks",
"Bruchstein":"cobblestone",
"Ofen":"furnace",
"Truhe":"chest",
"Leiter":"ladder"
};

// Bild laden
function getImage(name){
    const id = itemMap[name];
    if(!id) return "https://via.placeholder.com/32?text=?";
    return `https://mcasset.cloud/1.20/assets/minecraft/textures/block/${id}.png`;
}

// Stacks + Rest
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;

    if(rest === 0) return stacks + " Stacks";
    if(stacks === 0) return rest + " Blöcke";

    return stacks + " Stacks + " + rest;
}

// ROBUSTER Parser (fix)
function parseLine(line){
    if(!line.includes("|")) return null;

    const parts = line.split("|")
        .map(p => p.trim())
        .filter(p => p.length > 0);

    if(parts.length < 2) return null;

    const name = parts[0];
    const total = parseInt(parts[1]);

    if(isNaN(total)) return null;

    return { name, total };
}

// MAIN FIX
function convertList(){
    const textArea = document.getElementById("materialInput");
    const fileInput = document.getElementById("fileInput");

    function process(text){
        const lines = text.split("\n");
        const output = document.getElementById("output");
        output.innerHTML = "";

        lines.forEach(line=>{
            const item = parseLine(line);
            if(!item) return;

            const row = document.createElement("tr");
            row.innerHTML = `
                <td><img src="${getImage(item.name)}"></td>
                <td>${item.name}</td>
                <td>${item.total}</td>
                <td>${getStacks(item.total)}</td>
            `;
            output.appendChild(row);
        });
    }

    if(fileInput.files.length > 0){
        const reader = new FileReader();
        reader.onload = function(e){
            process(e.target.result);
        };
        reader.readAsText(fileInput.files[0]);
    } else {
        process(textArea.value);
    }
}

</script>

</body>
</html>
