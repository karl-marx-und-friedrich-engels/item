<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Latmetica mit echten Wiki‑Bildern</title>
<style>
body { font-family: Arial, background: #222; color: #fff; padding: 20px; }
textarea { width: 100%; height: 150px; background: #111; color: #0f0; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #444; padding: 8px; text-align: center; }
th { background: #333; }
img { width: 32px; height: 32px; }
</style>
</head>
<body>

<h1>Latmetica Materialliste-1</h1>
<textarea id="materialInput"></textarea><br>
<input type="file" id="fileInput"><br>
<button onclick="convertList()">Umwandeln</button>

<table>
  <thead>
    <tr><th>Bild</th><th>Item</th><th>Total</th><th>Stacks</th></tr>
  </thead>
  <tbody id="output"></tbody>
</table>

<script>
// → Beispiel‑Mapping: Deutsch → exakte Wiki‑Bild‑URL
const itemImageMap = {
  "Stein": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/87/Stone_JE3_BE3.png",
  "Eisentür": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3f/Iron_Door_JE3_BE3.png",
  "Laterne": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/f/fb/Lantern_%28item%29.png",
  "Truhe": "https://static.wikia.nocookie.net/minecraft_gamepedia/images/8/8a/Chest_%28item%29.png"
  // … weitere kannst du ergänzen
};

const placeholder = "https://via.placeholder.com/32?text=?";

function getStacks(total) {
  const stacks = Math.floor(total/64);
  const rest = total % 64;
  if(rest === 0) return stacks + " Stacks";
  if(stacks === 0) return rest + " Blöcke";
  return stacks + " Stacks + " + rest;
}

function parseLine(line) {
  if(!line.includes("|")) return null;
  const parts = line.split("|").map(p=>p.trim()).filter(p=>p);
  if(parts.length < 2) return null;
  const name = parts[0], total = parseInt(parts[1]);
  if(isNaN(total)) return null;
  return { name, total };
}

function convertList() {
  const text = document.getElementById("materialInput").value;
  const tbody = document.getElementById("output");
  tbody.innerHTML = "";
  text.split("\n").forEach(line => {
    const item = parseLine(line);
    if(!item) return;
    const imgURL = itemImageMap[item.name] || placeholder;
    const row = `<tr>
      <td><img src="${imgURL}"></td>
      <td>${item.name}</td>
      <td>${item.total}</td>
      <td>${getStacks(item.total)}</td>
    </tr>`;
    tbody.innerHTML += row;
  });
}
</script>

</body>
</html>
