<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>
<link rel="icon" href="bilder/f/Spyglass_(item)_JE3_BE1.png">
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
    margin: 0;
    text-align: center;
}
#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
#logo {
    width: 80px;
    height: 80px;
}
#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}
#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    min-width: 180px;
    z-index: 999;
}
#menu a {
    padding: 8px 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid #444;
    display: block;
    text-align: left;
}
#menu a:hover {
    background: #444;
}
.menu-sub {
    font-style: italic;
    margin-left: 15px;
    font-size: 0.9em;
    color: #aaa;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}
th {
    background-color: #222;
}
tbody tr:nth-child(odd) {
    background-color: #2b2b2b;
}
tbody tr:nth-child(even) {
    background-color: #3a3a3a;
}
tr:hover {
    background-color: #505050;
}
td.checkbox-cell {
    width: 40px;
}
tr.selected:nth-child(odd) {
    background-color: #006600;
}
tr.selected:nth-child(even) {
    background-color: #00aa00;
}
button.copy-btn {
    padding: 4px 8px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #007700;
    color: white;
}
button.copy-btn:hover {
    background-color: #00aa00;
}
#serverStatus {
    margin-bottom: 20px;
    font-size: 1.1em;
}
.progressContainer {
    width: 80%;
    height: 24px;
    background-color: #444;
    border-radius: 12px;
    margin: 10px auto;
    position: relative;
    overflow: hidden;
}
.progressBar {
    height: 100%;
    width: 0%;
    background-color: #00aa00;
    border-radius: 12px 0 0 12px;
    transition: width 0.5s;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    left: 0;
    line-height: 24px;
    color: #fff;
    font-weight: bold;
    pointer-events: none;
}

/* Zurück Button Design */
.back-btn {
    display: inline-block;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 25px;
    transition: background 0.2s;
}
.back-btn:hover { background: #333; }

/* Blackboard Kacheln (Übersichtsseite) */
.bb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: 20px auto;
}
.bb-card {
    background: #222;
    border: 1px solid #444;
    padding: 25px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: transform 0.2s, background 0.2s, border-color 0.2s;
}
.bb-card:hover {
    background: #2b2b2b;
    transform: scale(1.02);
    border-color: #00aa00;
}
.bb-card h3 { margin-top: 0; margin-bottom: 10px; color: #00aa00; }
.bb-card p { margin: 0; color: #aaa; font-size: 0.95em; line-height: 1.4; }

/* Blackboard Detailansicht (Eigene Seite) */
#blackboardDetail {
    max-width: 900px;
    margin: 0 auto;
    text-align: left;
    background: #222;
    border: 1px solid #444;
    padding: 30px;
    border-radius: 8px;
}
.bb-text {
    font-size: 1.1em;
    line-height: 1.6;
    margin-bottom: 30px;
    white-space: pre-wrap;
}
.bb-gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    margin-top: 15px;
}
.bb-gallery img {
    width: 220px;
    height: 140px;
    object-fit: cover;
    border: 1px solid #444;
    border-radius: 6px;
    background-color: #111;
    transition: transform 0.2s;
}
.bb-gallery img:hover {
    transform: scale(1.05);
    cursor: zoom-in;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Materialliste</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="progressSection" style="display:block;">
    <div class="progressContainer">
        <div id="blockProgress" class="progressBar"></div>
        <div id="blockProgressText" class="progressText">0% Blöcke</div>
    </div>
    <div class="progressContainer">
        <div id="itemProgress" class="progressBar"></div>
        <div id="itemProgressText" class="progressText">0% Items</div>
    </div>
</div>

<div id="material" style="display:block;">
<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<div id="waypointsSection" style="display:none;">
<table>
<thead>
<tr>
<th>Name</th>
<th>X</th>
<th>Y</th>
<th>Z</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="waypointsTable"></tbody>
</table>
</div>

<div id="blackboardOverview" style="display:none;">
    <p style="color: #aaa; margin-bottom: 25px;">Wähle ein Blackboard aus, um alle Details und Bilder anzuzeigen.</p>
    <div id="bbGridContainer" class="bb-grid"></div>
</div>

<div id="blackboardDetailSection" style="display:none;">
    <button class="back-btn" onclick="showSection('blackboardOverview')">← Zurück zur Übersicht</button>
    <div id="blackboardDetail">
        <h2 id="bbDetailTitle" style="color: #00aa00; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px;"></h2>
        <div id="bbDetailText" class="bb-text"></div>
        <h3 style="border-top: 1px solid #444; padding-top: 20px; margin-top: 30px; color: #00aa00;">Projekt-Bilder:</h3>
        <div id="bbDetailGallery" class="bb-gallery"></div>
    </div>
</div>

<script>
// ==========================
// SEKTIONS-STEUERUNG (Aktualisiert für die neuen Blackboard-Seiten)
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function showSection(section, extraParam=null){
    document.getElementById("material").style.display = section==='material'?'block':'none';
    document.getElementById("progressSection").style.display = section==='material'?'block':'none';
    document.getElementById("waypointsSection").style.display = section==='waypoints'?'block':'none';
    document.getElementById("blackboardOverview").style.display = section==='blackboardOverview'?'block':'none';
    document.getElementById("blackboardDetailSection").style.display = section==='blackboardDetail'?'block':'none';
    
    if(section==='material' && extraParam) loadProject(extraParam);
    if(section==='waypoints') loadWaypoints();
    if(section==='blackboardOverview') loadBlackboardOverview();
    if(section==='blackboardDetail' && extraParam) loadBlackboardDetail(extraParam);
    
    document.getElementById("menu").style.display = "none";
}

// ==========================
// CLOCK ANIMATION
// ==========================
const logo = document.getElementById("logo");
const frames = 64;
const images = [];
for(let i=0;i<frames;i++){
    const img = new Image();
    img.src=`bilder/resized_1024_clock_${String(i).padStart(2,'0')}.png`;
    images.push(img);
}
let current=0;
setInterval(()=>{logo.src=images[current].src;current=(current+1)%frames;},50);

// ==========================
// HELPERS
// ==========================
function getStacks(total){
    const stacks=Math.floor(total/64);
    const rest=total%64;
    if(stacks===0) return rest+" Blöcke";
    if(rest===0) return stacks+" Stacks";
    return stacks+" Stacks + "+rest;
}
function parseLine(line){
    line=line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts=line.split('|').map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;
    const name=parts[0];
    const total=parseInt(parts[1].replace(/\s+/g,''));
    if(isNaN(total)) return null;
    return {name,total};
}

// ==========================
// LOAD PROJECTS, BLACKBOARDS & MENU
// ==========================
fetch('projects_status.txt').then(res=>res.text()).then(statusText=>{
    const lines=statusText.split('\n');
    const menu=document.getElementById('menu');

    // Hauptpunkte hinzufügen
    const materialLi=document.createElement('a'); materialLi.href="#"; materialLi.textContent="Materialliste";
    menu.appendChild(materialLi);

    const wpLi=document.createElement('a'); wpLi.href="#"; wpLi.textContent="Waypoints"; wpLi.onclick=()=>showSection('waypoints');
    menu.appendChild(wpLi);

    const bbMainLi=document.createElement('a'); bbMainLi.href="#"; bbMainLi.textContent="Blackboards"; bbMainLi.onclick=()=>showSection('blackboardOverview');
    menu.appendChild(bbMainLi);

    // Projekt-Unterpunkte laden
    const activeProjects=[];
    lines.forEach((line,index)=>{
        const [proj,val]=line.split(':');
        if(val && val.trim()==='1') activeProjects.push({file:`projekt_${index+1}.txt`});
    });

    activeProjects.forEach(p=>{
        fetch(p.file).then(res=>res.text()).then(txt=>{
            const nameLine=txt.split('\n').find(l=>l.startsWith('Name:'));
            const projectName=nameLine?nameLine.split(':')[1].trim():"Projekt";
            const a=document.createElement('a');
            a.href="#"; a.textContent=projectName;
            a.className="menu-sub";
            a.onclick=()=>showSection('material',p.file);
            menu.insertBefore(a, wpLi);
        });
    });

    // Blackboard-Unterpunkte dynamisch ins Menü laden
    fetch('blackboards/blackboard_status.txt').then(res=>res.text()).then(bbStatusText=>{
        const bbLines = bbStatusText.split('\n');
        bbLines.forEach(line => {
            const [folder, val] = line.split(':');
            if(val && val.trim() === '1') {
                const folderName = folder.trim();
                fetch(`blackboards/${folderName}/info.txt`).then(res=>res.text()).then(txt => {
                    const titleLine = txt.split('\n').find(l => l.toLowerCase().startsWith('titel:'));
                    const bbName = titleLine ? titleLine.split(':')[1].trim() : folderName;
                    
                    const a = document.createElement('a');
                    a.href = "#"; a.textContent = bbName;
                    a.className = "menu-sub";
                    a.onclick = () => showSection('blackboardDetail', folderName);
                    menu.appendChild(a);
                }).catch(() => {
                    const a = document.createElement('a');
                    a.href = "#"; a.textContent = folderName;
                    a.className = "menu-sub";
                    a.onclick = () => showSection('blackboardDetail', folderName);
                    menu.appendChild(a);
                });
            }
        });
    }).catch(() => console.log("Keine blackboard_status.txt gefunden."));

    if(activeProjects.length>0) showSection('material',activeProjects[0].file);
    else showSection('waypoints');
});

// ==========================
// LOAD PROJECT FILE
// ==========================
function loadProject(file){
    fetch(file).then(res=>res.text()).then(text=>{
        const output=document.getElementById("output");
        output.innerHTML='';

        const nameLine=text.split('\n').find(l=>l.startsWith('Name:'));
        const projectName=nameLine?nameLine.split(':')[1].trim():"Unbekanntes Projekt";
        document.getElementById('projectTitle').textContent=projectName;

        const sections=text.split('Originalliste:');
        const matLines=sections[0].split('\n');
        const origLines=sections[1]?sections[1].split('\n'):[];

        let totalMatBlocks=0,totalOrigBlocks=0,totalMatItems=0,totalOrigItems=0;
        const matItems={},origItems={};

        matLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ matItems[item.name]=item.total; totalMatBlocks+=item.total; totalMatItems++; }
        });
        origLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ origItems[item.name]=item.total; totalOrigBlocks+=item.total; totalOrigItems++; }
        });

        const blockProgress=totalOrigBlocks>0?Math.floor(((totalOrigBlocks-totalMatBlocks)/totalOrigBlocks)*100):0;
        const itemProgress=totalOrigItems>0?Math.floor(((totalOrigItems-totalMatItems)/totalOrigItems)*100):0;

        document.getElementById('blockProgress').style.width=blockProgress+'%';
        document.getElementById('blockProgressText').textContent=blockProgress+'% Blöcke';
        document.getElementById('itemProgress').style.width=itemProgress+'%';
        document.getElementById('itemProgressText').textContent=itemProgress+'% Items';

        for(const name in matItems){
            const total=matItems[name];
            const row=document.createElement("tr");
            const nameCell=document.createElement("td"); nameCell.textContent=name;
            const totalCell=document.createElement("td"); totalCell.textContent=total;
            const stacksCell=document.createElement("td"); stacksCell.textContent=getStacks(total);
            const checkbox=document.createElement("input"); checkbox.type="checkbox"; checkbox.style.width="24px"; checkbox.style.height="24px";
            checkbox.addEventListener('change',()=>row.classList.toggle('selected', checkbox.checked));
            const checkboxCell=document.createElement("td"); checkboxCell.className="checkbox-cell"; checkboxCell.appendChild(checkbox);
            row.appendChild(nameCell); row.appendChild(totalCell); row.appendChild(stacksCell); row.appendChild(checkboxCell);
            output.appendChild(row);
        }
    }).catch(err=>console.error("Fehler beim Laden des Projekts:", err));
}

// ==========================
// LOAD WAYPOINTS
// ==========================
function loadWaypoints(){
    const table=document.getElementById("waypointsTable");
    table.innerHTML=''; 
    fetch('waypoints.txt').then(res=>res.text()).then(text=>{
        const lines=text.split('\n');
        lines.forEach(l=>{
            if(!l.trim()) return;
            const parts=l.split(',');
            const row=document.createElement('tr');
            parts.forEach((v,i)=>{
                const td=document.createElement('td'); td.textContent=v.trim(); row.appendChild(td);
            });
            const actionTd=document.createElement('td');
            const copyBtn=document.createElement('button'); copyBtn.textContent="Kopieren"; copyBtn.className="copy-btn";
            copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(parts.slice(1).join(', ')); copyBtn.textContent='✔'; setTimeout(()=>copyBtn.textContent='Kopieren',1000);});
            actionTd.appendChild(copyBtn);
            row.appendChild(actionTd);
            table.appendChild(row);
        });
        document.getElementById('projectTitle').textContent="Waypoints";
    }).catch(err=>console.error("Fehler beim Laden der Waypoints:",err));
}

// ==========================
// BLACKBOARD: ÜBERSICHTS-GENERATOR (KACHELN)
// ==========================
function loadBlackboardOverview() {
    const container = document.getElementById("bbGridContainer");
    container.innerHTML = "Wird geladen...";
    document.getElementById('projectTitle').textContent = "Blackboards";

    fetch('blackboards/blackboard_status.txt').then(res=>res.text()).then(bbStatusText=>{
        container.innerHTML = "";
        const bbLines = bbStatusText.split('\n');
        let hasActive = false;

        bbLines.forEach(line => {
            const [folder, val] = line.split(':');
            if(val && val.trim() === '1') {
                hasActive = true;
                const folderName = folder.trim();

                const card = document.createElement("div");
                card.className = "bb-card";
                card.onclick = () => showSection('blackboardDetail', folderName);
                
                const h3 = document.createElement("h3");
                h3.textContent = folderName;
                card.appendChild(h3);

                const p = document.createElement("p");
                p.textContent = "Klicke für Details und Bilder.";
                card.appendChild(p);

                container.appendChild(card);

                // Holt echten Titel & Beschreibung für die Kachelvorschau
                fetch(`blackboards/${folderName}/info.txt`).then(res=>res.text()).then(txt=>{
                    const lines = txt.split('\n');
                    const titleLine = lines.find(l => l.toLowerCase().startsWith('titel:'));
                    const descLine = lines.find(l => l.toLowerCase().startsWith('beschreibung:'));
                    
                    if(titleLine) h3.textContent = titleLine.split(':')[1].trim();
                    if(descLine) {
                        let descText = descLine.split(/:(.+)/)[1].trim();
                        if(descText.length > 70) descText = descText.substring(0, 67) + "...";
                        p.textContent = descText;
                    }
                }).catch(()=>{});
            }
        });

        if(!hasActive) container.innerHTML = "<p>Keine aktiven Blackboards vorhanden.</p>";
    }).catch(() => {
        container.innerHTML = "<p>blackboards/blackboard_status.txt konnte nicht geladen werden.</p>";
    });
}

// ==========================
// BLACKBOARD: DETAILANSICHT (EIGENE SEITE)
// ==========================
function loadBlackboardDetail(folder) {
    const titleEl = document.getElementById("bbDetailTitle");
    const textEl = document.getElementById("bbDetailText");
    const galleryEl = document.getElementById("bbDetailGallery");

    titleEl.textContent = "Wird geladen...";
    textEl.textContent = "";
    galleryEl.innerHTML = "";

    fetch(`blackboards/${folder}/info.txt`).then(res=>res.text()).then(txt => {
        const lines = txt.split('\n');
        let title = folder;
        let fullText = "";
        let explicitImages = [];

        lines.forEach(l => {
            const cleanLine = l.trim();
            if(cleanLine.toLowerCase().startsWith('titel:')) {
                title = l.split(':')[1].trim();
            } else if(cleanLine.toLowerCase().startsWith('bilder:')) {
                // Liest benutzerdefinierte Bildnamen aus
                const imgList = l.split(/:(.+)/)[1].trim();
                explicitImages = imgList.split(',').map(img => img.trim()).filter(img => img);
            } else {
                fullText += l + "\n";
            }
        });

        document.getElementById('projectTitle').textContent = title;
        titleEl.textContent = title;
        textEl.textContent = fullText.trim();

        // Bilder laden
        if(explicitImages.length > 0) {
            // Methode A: Benutzerdefinierte Namen aus der Textdatei laden
            explicitImages.forEach(imgName => {
                const img = document.createElement("img");
                img.src = `blackboards/${folder}/${imgName}`;
                img.alt = imgName;
                img.onerror = function() { this.remove(); };
                galleryEl.appendChild(img);
            });
        } else {
            // Methode B: Automatischer Suchlauf nach Nummern (0.png, 1.png, 2.png...)
            const extensions = ['png', 'jpg', 'jpeg'];
            for(let i = 0; i <= 20; i++) {
                extensions.forEach(ext => {
                    const img = document.createElement("img");
                    img.src = `blackboards/${folder}/${i}.${ext}`;
                    img.alt = `Bild ${i}`;
                    img.onerror = function() { this.remove(); };
                    galleryEl.appendChild(img);
                });
            }
        }
    }).catch(() => {
        titleEl.textContent = "Fehler";
        textEl.textContent = `Die Datei info.txt im Ordner 'blackboards/${folder}/' wurde nicht gefunden.`;
    });
}
</script>
</body>
</html>
