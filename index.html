<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    padding: 20px;
}

#container {
    max-width: 1200px;
    margin: auto;
    background: #2a2a2a;
    padding: 20px;
    border-radius: 8px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #444;
    text-align: center;
}

th {
    background: #333;
}
</style>
</head>
<body>

<div id="container">
<h1>Materialliste</h1>

<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>

</div>

<script>
// Berechnung der Stacks
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;
    if(stacks === 0) return rest + " Blöcke";
    if(rest === 0) return stacks + " Stacks";
    return stacks + " Stacks + " + rest;
}

// Parsen einer Zeile der Materialliste
function parseLine(line){
    const parts = line.split("|").map(p => p.trim());
    if(parts.length < 2) return null;
    const name = parts[0];
    const total = parseInt(parts[1]);
    if(isNaN(total)) return null;
    return {name, total};
}

// Materialliste automatisch laden
// Geht nur, wenn die Datei im gleichen Ordner wie die HTML liegt
fetch('Update material_list_2026-03-29_16.54.28.txt')
    .then(res => res.text())
    .then(text => {
        const lines = text.trim().split("\n");
        const out = document.getElementById("output");
        lines.forEach(line => {
            const item = parseLine(line);
            if(!item) return;
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${item.name}</td>
                <td>${item.total}</td>
                <td>${getStacks(item.total)}</td>
            `;
            out.appendChild(row);
        });
    })
    .catch(err => {
        console.error("Fehler beim Laden der Materialliste:", err);
    });
</script>

</body>
</html>
