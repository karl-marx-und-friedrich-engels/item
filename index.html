<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta charset="UTF-8">
<title>Latmetica Materialliste mit Icons</title>

<!-- MCicons CSS über CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mcicons/css/mcicons.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: #1e1e1e;
  color: #fff;
  padding: 20px;
}
#container {
  max-width: 1100px;
  margin: auto;
  background: #2a2a2a;
  padding: 20px;
  border-radius: 8px;
}
textarea {
  width: 100%;
  height: 150px;
  background: #111;
  color: #0f0;
  padding: 10px;
  font-family: monospace;
}
button {
  margin-top: 10px;
  padding: 10px;
  background: #00aaff;
  border: none;
  color: white;
  cursor: pointer;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #444;
  text-align: center;
}
th {
  background: #333;
}
.icon {
  font-size: 32px;
}
</style>
</head>
<body>

<div id="container">
  <h1>Latmetica Materialliste 📋</h1>

  <textarea id="materialInput" placeholder="Materialliste hier einfügen..."></textarea><br>
  <input type="file" id="fileInput"><br>
  <button onclick="convertList()">Umwandeln</button>

  <table>
    <thead>
      <tr>
        <th>Icon</th>
        <th>Item</th>
        <th>Total</th>
        <th>Stacks</th>
      </tr>
    </thead>
    <tbody id="output"></tbody>
  </table>
</div>

<script>

// Mapping deutsch → MCicons (Minecraft IDs)
const itemIconMap = {
  "Stein": "stone",
  "Steinziegel": "stone_bricks",
  "Andesit": "andesite",
  "Fichtenholzbretter": "spruce_planks",
  "Eichenholzbretter": "oak_planks",
  "Ofen": "furnace",
  "Truhe": "chest",
  "Leiter": "ladder",
  "Laterne": "lantern",
  "Bücherregal": "bookshelf"
  // mehr kannst du nach Bedarf ergänzen
};

function getIconClass(name) {
  const id = itemIconMap[name];
  return id ? `mc mc-${id} icon` : `mc mc-question_mark icon`;
}

function getStacks(total) {
  const stacks = Math.floor(total / 64);
  const rest = total % 64;
  if(rest === 0) return stacks + " Stacks";
  if(stacks === 0) return rest + " Blöcke";
  return stacks + " Stacks + " + rest;
}

function parseLine(line) {
  if(!line.includes("|")) return null;
  const parts = line.split("|").map(p => p.trim()).filter(p => p);
  if(parts.length < 2) return null;
  const name = parts[0];
  const total = parseInt(parts[1]);
  if(isNaN(total)) return null;
  return { name, total };
}

function convertList() {
  function process(text) {
    const lines = text.split("\n");
    const output = document.getElementById("output");
    output.innerHTML = "";
    lines.forEach(line => {
      const item = parseLine(line);
      if(!item) return;
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><i class="${getIconClass(item.name)}"></i></td>
        <td>${item.name}</td>
        <td>${item.total}</td>
        <td>${getStacks(item.total)}</td>
      `;
      output.appendChild(row);
    });
  }
  const file = document.getElementById("fileInput").files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e => process(e.target.result);
    reader.readAsText(file);
  } else {
    process(document.getElementById("materialInput").value);
  }
}

</script>
</body>
</html>
