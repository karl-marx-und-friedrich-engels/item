<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Projektübersicht - Minecraft Welt</title>
<link rel="icon" type="image/png" href="Knowledge_Book_JE2.png">
<style>
  body { font-family: Arial, sans-serif; background: #1e1e1e; color: #eee; margin: 0; padding: 0;}
  header { display: flex; justify-content: center; align-items: center; padding: 10px; background: #2c2c2c; position: relative;}
  header h1 { margin: 0 20px; }
  #serverStatus { margin-left: 20px; font-size: 14px; }
  #logo { width: 48px; height: 48px; margin-left: 10px; }
  .material-table { margin: 20px auto; border-collapse: collapse; width: 90%; max-width: 1000px;}
  .material-table th, .material-table td { border: 1px solid #555; padding: 8px; text-align: left; }
  .row-light { background-color: #3a5f3a; }
  .row-dark { background-color: #2a4f2a; }
  .checked { background-color: #1f7a1f !important; text-decoration: line-through;}
  .progress-bar { width: 90%; max-width: 1000px; height: 20px; background: #555; margin: 0 auto 20px; border-radius: 5px; overflow: hidden;}
  .progress-bar-fill { height: 100%; width: 0; background: #0f0; transition: width 0.5s; }
  .checkbox-cell { text-align: center; width: 30px;}
  /* Drei-Striche Menü */
  #menuButton { position: absolute; right: 20px; top: 15px; cursor: pointer; }
  #menuButton div { width: 25px; height: 3px; background-color: #eee; margin: 5px 0; }
  #menuContent { display: none; position: absolute; right: 20px; top: 50px; background: #2c2c2c; padding: 10px; border: 1px solid #555; border-radius: 5px; }
  #menuContent button { display: block; margin: 5px 0; width: 150px; }
  #waypoints, #materialWrapper { display: none; }
</style>
</head>
<body>

<header>
  <img id="logo" src="resized_1024_clock_00.png" alt="Uhr">
  <h1>Materialliste</h1>
  <span id="serverStatus">Server: offline</span>
  <div id="menuButton" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </div>
  <div id="menuContent">
    <button onclick="showMaterial()">Materialliste</button>
    <button onclick="showWaypoints()">Waypoints</button>
  </div>
</header>

<div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>

<div id="materialWrapper">
  <table class="material-table" id="materialTable">
    <thead>
      <tr>
        <th>✓</th>
        <th>Item</th>
        <th>Total</th>
        <th>Missing</th>
        <th>Available</th>
      </tr>
    </thead>
    <tbody id="materialBody"></tbody>
  </table>
</div>

<div id="waypoints">
  <h2>Waypoints</h2>
  <table class="material-table" id="waypointTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>X</th>
        <th>Y</th>
        <th>Z</th>
        <th>Copy</th>
      </tr>
    </thead>
    <tbody id="waypointBody"></tbody>
  </table>
</div>

<script>
// --- Uhr Animation ---
let frame = 0;
let totalFrames = 64;
let logo = document.getElementById("logo");
function animateClock() {
    frame = (frame + 1) % totalFrames;
    logo.src = `resized_1024_clock_${frame.toString().padStart(2,'0')}.png`;
}
setInterval(animateClock, 80);

// --- Menü ---
function toggleMenu() {
  let menu = document.getElementById("menuContent");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}
function showMaterial() { document.getElementById("materialWrapper").style.display = "block"; document.getElementById("waypoints").style.display = "none"; }
function showWaypoints() { document.getElementById("materialWrapper").style.display = "none"; document.getElementById("waypoints").style.display = "block"; }

// --- Materialliste laden ---
async function loadMaterial() {
    let res = await fetch("projekt1.txt"); // deine Projekt-1-Datei
    let text = await res.text();

    // Parse Active Status
    let active = /Active:\s*1/.test(text);
    if(!active) { document.getElementById("materialWrapper").innerHTML = "<p>Projekt ist deaktiviert</p>"; return; }

    // Parse Materialliste
    let currentMatch = text.match(/Materialliste:\s*([\s\S]*?)Originalliste:/);
    let originMatch = text.match(/Originalliste:\s*([\s\S]*)/);

    if(!currentMatch || !originMatch) return;

    let currentLines = currentMatch[1].split("\n").filter(l=>l.includes("|") && l.trim().startsWith("|"));
    let originLines = originMatch[1].split("\n").filter(l=>l.includes("|") && l.trim().startsWith("|"));

    // Hilfsfunktion parse
    function parseTable(lines) {
        let items = [];
        for(let line of lines) {
            let cols = line.split("|").map(c=>c.trim());
            if(cols.length >= 5 && !cols[1].startsWith("Item")) {
                items.push({name: cols[1], total: parseInt(cols[2]), missing: parseInt(cols[3]), available: parseInt(cols[4])});
            }
        }
        return items;
    }

    let currentItems = parseTable(currentLines);
    let originItems = parseTable(originLines);

    // Tabelle generieren
    let tbody = document.getElementById("materialBody");
    tbody.innerHTML = "";
    for(let i=0;i<currentItems.length;i++) {
        let row = document.createElement("tr");
        row.className = (i%2===0) ? "row-light" : "row-dark";

        let chk = document.createElement("td");
        chk.className = "checkbox-cell";
        let input = document.createElement("input");
        input.type="checkbox";
        input.onchange = ()=>{ row.classList.toggle("checked"); };
        chk.appendChild(input);
        row.appendChild(chk);

        row.appendChild(createCell(currentItems[i].name));
        row.appendChild(createCell(currentItems[i].total));
        row.appendChild(createCell(currentItems[i].missing));
        row.appendChild(createCell(currentItems[i].available));
        tbody.appendChild(row);
    }

    // --- Prozent-Fortschritt berechnen ---
    let totalItems = originItems.reduce((sum,it)=>sum+it.total,0);
    let collectedItems = currentItems.reduce((sum,it)=>sum+it.total,0);
    let percent = Math.round((collectedItems/totalItems)*100);
    document.getElementById("progressFill").style.width = percent+"%";
}

function createCell(text) {
    let td = document.createElement("td");
    td.textContent = text;
    return td;
}

// --- Waypoints laden ---
async function loadWaypoints() {
    let res = await fetch("waypoints.txt");
    let text = await res.text();
    let lines = text.split("\n").filter(l=>l.trim() !== "");
    let tbody = document.getElementById("waypointBody");
    tbody.innerHTML="";
    for(let line of lines) {
        let parts = line.split(",");
        let row = document.createElement("tr");
        ["Name","X","Y","Z"].forEach((v,i)=>{
            let td = document.createElement("td");
            td.textContent = parts[i] || "";
            row.appendChild(td);
        });
        let btn = document.createElement("td");
        let copyBtn = document.createElement("button");
        copyBtn.textContent = "Copy";
        copyBtn.onclick = ()=>{ navigator.clipboard.writeText(`${parts[1]}, ${parts[2]}, ${parts[3]}`); };
        btn.appendChild(copyBtn);
        row.appendChild(btn);
        tbody.appendChild(row);
    }
}

// --- Serverstatus simuliert ---
async function updateServerStatus() {
    // Beispiel: ping über fetch oder statische Anzeige
    document.getElementById("serverStatus").textContent = "Server: Online";
}

// --- Initialisierung ---
loadMaterial();
loadWaypoints();
updateServerStatus();
showMaterial(); // initial Materialliste anzeigen
</script>

</body>
</html>
