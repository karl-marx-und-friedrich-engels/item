<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste mit Bildern</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    padding: 20px;
}

#container {
    max-width: 1200px;
    margin: auto;
    background: #2a2a2a;
    padding: 20px;
    border-radius: 8px;
}

textarea {
    width: 100%;
    height: 150px;
    background: #111;
    color: #0f0;
    padding: 10px;
    font-family: monospace;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #00aa55;
    border: none;
    color: white;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #444;
    text-align: center;
}

th {
    background: #333;
}

img {
    width: 32px;
    height: 32px;
}
</style>
</head>
<body>

<div id="container">
<h1>Materialliste</h1>

<textarea id="input"></textarea><br>
<input type="file" id="fileInput"><br>
<button onclick="convert()">Umwandeln</button>

<table>
<thead>
<tr>
<th>Bild</th>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>

</div>

<script>
// ---------------------------
// BILDER ARRAY
// ---------------------------
// Trage hier alle Dateinamen ein, die du in deinem images-Ordner hast
const images = [
"yellow_wool.png",
"redstone_block.png",
"redstone_torch.png",
"stone.png",
"oak_planks.png",
"spruce_planks.png",
"furnace.png",
"chest.png",
"ladder.png",
"lantern.png"
];

// ---------------------------
// HILFSFUNKTIONEN
// ---------------------------

function normalize(text) {
    return text.toLowerCase()
               .replace(/ä/g, "ae")
               .replace(/ö/g, "oe")
               .replace(/ü/g, "ue")
               .replace(/ß/g, "ss")
               .replace(/[^a-z0-9]/g, "");
}

function findBestImage(itemName) {
    const nItem = normalize(itemName);

    let best = null;
    let bestScore = 0;

    images.forEach(img => {
        const name = img.replace(".png", "");
        const nImg = normalize(name);

        let score = 0;

        if(nItem.includes(nImg)) score += 2;
        if(nImg.includes(nItem)) score += 2;

        // Teilmatch
        for(let i=0;i<nImg.length;i++){
            if(nItem.includes(nImg[i])) score++;
        }

        if(score > bestScore){
            bestScore = score;
            best = img;
        }
    });

    // Fallback: mind. Score 3
    if(bestScore < 3) return null;
    return best;
}

function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;

    if(stacks===0) return rest + " Blöcke";
    if(rest===0) return stacks + " Stacks";
    return stacks + " Stacks + " + rest;
}

function parse(line){
    if(!line.includes("|")) return null;
    const parts = line.split("|").map(p => p.trim()).filter(p => p);
    if(parts.length < 2) return null;

    const name = parts[0];
    const total = parseInt(parts[1]);
    if(isNaN(total)) return null;

    return {name, total};
}

// ---------------------------
// MAIN
// ---------------------------

function convert() {
    function process(text){
        const lines = text.split("\n");
        const out = document.getElementById("output");
        out.innerHTML = "";

        lines.forEach(line => {
            const item = parse(line);
            if(!item) return;

            const img = findBestImage(item.name);

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${img ? `<img src="images/${img}">` : "❌"}</td>
                <td>${item.name}</td>
                <td>${item.total}</td>
                <td>${getStacks(item.total)}</td>
            `;

            out.appendChild(row);
        });
    }

    const file = document.getElementById("fileInput").files[0];

    if(file){
        const reader = new FileReader();
        reader.onload = e => process(e.target.result);
        reader.readAsText(file);
    } else {
        process(document.getElementById("input").value);
    }
}
</script>
</body>
</html>
