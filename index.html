<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>
<link rel="icon" href="bilder/Knowledge_Book_JE2.png">

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
    margin: 0;
    text-align: center;
}
#header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
#logo {
    width: 80px;
    height: 80px;
}
#menuButton {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}
#menu {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    display: none;
    flex-direction: column;
    min-width: 180px;
}
#menu a {
    padding: 8px 10px;
    text-decoration: none;
    color: white;
    border-bottom: 1px solid #444;
    display: block;
}
#menu a:hover {
    background: #444;
}
.menu-sub {
    font-style: italic;
    margin-left: 15px;
    font-size: 0.9em;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}
th {
    background-color: #222;
}
tbody tr:nth-child(odd) {
    background-color: #2b2b2b;
}
tbody tr:nth-child(even) {
    background-color: #3a3a3a;
}
tr:hover {
    background-color: #505050;
}
td.checkbox-cell {
    width: 40px;
}
tr.selected:nth-child(odd) {
    background-color: #006600;
}
tr.selected:nth-child(even) {
    background-color: #00aa00;
}
button.copy-btn {
    padding: 4px 8px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #007700;
    color: white;
}
button.copy-btn:hover {
    background-color: #00aa00;
}
#serverStatus {
    margin-bottom: 20px;
    font-size: 1.1em;
}
.progressContainer {
    width: 80%;
    height: 24px;
    background-color: #444;
    border-radius: 12px;
    margin: 10px auto;
    position: relative;
    overflow: hidden;
}
.progressBar {
    height: 100%;
    width: 0%;
    background-color: #00aa00;
    border-radius: 12px 0 0 12px;
    transition: width 0.5s;
}
.progressText {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 0;
    left: 0;
    line-height: 24px;
    color: #fff;
    font-weight: bold;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="menuButton" onclick="toggleMenu()">☰</div>
<div id="menu"></div>

<div id="header">
    <h1 id="projectTitle">Materialliste</h1>
    <img id="logo" src="bilder/resized_1024_clock_00.png">
</div>

<div id="progressSection" style="display:block;">
    <div class="progressContainer">
        <div id="blockProgress" class="progressBar"></div>
        <div id="blockProgressText" class="progressText">0% Blöcke</div>
    </div>
    <div class="progressContainer">
        <div id="itemProgress" class="progressBar"></div>
        <div id="itemProgressText" class="progressText">0% Items</div>
    </div>
</div>

<div id="material" style="display:block;">
<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

<div id="waypointsSection" style="display:none;">
<table>
<thead>
<tr>
<th>Name</th>
<th>X</th>
<th>Y</th>
<th>Z</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="waypointsTable"></tbody>
</table>
</div>

<script>

// ==========================
// MENU
// ==========================
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function showSection(section, projectFile=null){
    document.getElementById("material").style.display = section==='material'?'block':'none';
    document.getElementById("progressSection").style.display = section==='material'?'block':'none';
    document.getElementById("waypointsSection").style.display = section==='waypoints'?'block':'none';
    if(section==='material' && projectFile) loadProject(projectFile);
    if(section==='waypoints') loadWaypoints();
}

// ==========================
// HELPERS
// ==========================
function getStacks(total){
    const stacks=Math.floor(total/64);
    const rest=total%64;
    if(stacks===0) return rest+" Blöcke";
    if(rest===0) return stacks+" Stacks";
    return stacks+" Stacks + "+rest;
}

function parseLine(line){
    line=line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts=line.split('|').map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;
    const name=parts[0];
    const total=parseInt(parts[1].replace(/\s+/g,''));
    if(isNaN(total)) return null;
    return {name,total};
}

// ==========================
// LOAD PROJECT FILE
// ==========================
function loadProject(file){
    fetch(file).then(res=>res.text()).then(text=>{

        const output=document.getElementById("output");
        output.innerHTML='';

        const nameLine=text.split('\n').find(l=>l.startsWith('Name:'));
        const projectName=nameLine?nameLine.split(':')[1].trim():"Unbekanntes Projekt";
        document.getElementById('projectTitle').textContent=projectName;

        const sections=text.split('Originalliste:');
        const matLines=sections[0].split('\n');
        const origLines=sections[1]?sections[1].split('\n'):[];

        let totalMatBlocks=0,totalOrigBlocks=0,totalMatItems=0,totalOrigItems=0;
        const matItems={},origItems={};

        matLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ matItems[item.name]=item.total; totalMatBlocks+=item.total; totalMatItems++; }
        });

        origLines.forEach(l=>{
            const item=parseLine(l);
            if(item){ origItems[item.name]=item.total; totalOrigBlocks+=item.total; totalOrigItems++; }
        });

        // 🔥 NEU: FERTIG CHECK
        const isFinished = totalMatItems === 0;

        let blockProgress = 0;
        let itemProgress = 0;

        if (isFinished) {
            blockProgress = 100;
            itemProgress = 100;
        } else {
            blockProgress = totalOrigBlocks>0 ? Math.floor(((totalOrigBlocks-totalMatBlocks)/totalOrigBlocks)*100) : 0;
            itemProgress = totalOrigItems>0 ? Math.floor(((totalOrigItems-totalMatItems)/totalOrigItems)*100) : 0;
        }

        document.getElementById('blockProgress').style.width=blockProgress+'%';
        document.getElementById('itemProgress').style.width=itemProgress+'%';

        if (isFinished) {
            document.getElementById('blockProgressText').textContent="100% – Alle Materialien gesammelt 🎉";
            document.getElementById('itemProgressText').textContent="Projekt fertig ✅";
            document.getElementById('projectTitle').textContent += " ✅";

            const row=document.createElement("tr");
            const cell=document.createElement("td");
            cell.colSpan=4;
            cell.textContent="🎉 Alles gesammelt!";
            row.appendChild(cell);
            output.appendChild(row);
            return;
        } else {
            document.getElementById('blockProgressText').textContent=blockProgress+'% Blöcke';
            document.getElementById('itemProgressText').textContent=itemProgress+'% Items';
        }

        for(const name in matItems){
            const total=matItems[name];
            const row=document.createElement("tr");

            const nameCell=document.createElement("td");
            nameCell.textContent=name;

            const totalCell=document.createElement("td");
            totalCell.textContent=total;

            const stacksCell=document.createElement("td");
            stacksCell.textContent=getStacks(total);

            const checkbox=document.createElement("input");
            checkbox.type="checkbox";
            checkbox.style.width="24px";
            checkbox.style.height="24px";
            checkbox.addEventListener('change',()=>row.classList.toggle('selected', checkbox.checked));

            const checkboxCell=document.createElement("td");
            checkboxCell.className="checkbox-cell";
            checkboxCell.appendChild(checkbox);

            row.appendChild(nameCell);
            row.appendChild(totalCell);
            row.appendChild(stacksCell);
            row.appendChild(checkboxCell);

            output.appendChild(row);
        }

    });
}

// ==========================
// START
// ==========================
loadProject("projekt_1.txt");

</script>
</body>
</html>
