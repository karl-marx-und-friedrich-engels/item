<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}

th {
    background-color: #222;
}

/* Grautöne für Zeilen */
tbody tr:nth-child(odd) {
    background-color: #2b2b2b; /* dunkleres Grau */
}

tbody tr:nth-child(even) {
    background-color: #3a3a3a; /* helleres Grau */
}

/* Hover-Effekt */
tr:hover {
    background-color: #505050;
}

/* Checkbox-Zelle rechts, größer */
td.checkbox-cell {
    width: 40px;
}

/* Abgehakt: unterschiedliche Grüntöne je nach ursprünglicher Farbe */
tr.selected:nth-child(odd) {
    background-color: #006600; /* dunkleres Grün für dunkle Grauzellen */
}

tr.selected:nth-child(even) {
    background-color: #00aa00; /* helleres Grün für helle Grauzellen */
}
</style>
</head>
<body>

<h1>Materialliste</h1>

<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
<th>Stacks</th>
<th></th>
</tr>

<!-- Animiertes Logo direkt über den Spalten -->
<tr>
    <th colspan="4" style="text-align:center; background-color:#1f1f1f; border:none;">
        <img id="logo" src="images/glock_00.png" alt="Logo" style="width:80px; height:80px;">
    </th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>

<script>
// ------------------
// Animiertes Logo
// ------------------
const logo = document.getElementById("logo");
const frames = 10; // Anzahl der PNG-Dateien (00 bis 09)
let currentFrame = 0;

setInterval(() => {
    currentFrame = (currentFrame + 1) % frames;
    const frameNumber = String(currentFrame).padStart(2, '0'); // 00, 01, 02…
    logo.src = `images/glock_${frameNumber}.png`;
}, 100); // 100ms pro Frame = 10 FPS

// ------------------
// Materialliste
// ------------------

// Berechnung der Stacks
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;
    if(stacks === 0) return rest + " Blöcke";
    if(rest === 0) return stacks + " Stacks";
    return stacks + " Stacks + " + rest;
}

// Parsen der Zeilen
function parseLine(line){
    line = line.trim();
    if(!line || line.startsWith('+') || line.startsWith('| Item') || line.startsWith('| Material List')) return null;
    const parts = line.split('|').map(p => p.trim()).filter(p => p);
    if(parts.length < 2) return null;
    const name = parts[0];
    const total = parseInt(parts[1].replace(/\s+/g, ''));
    if(isNaN(total)) return null;
    return {name, total};
}

// Materialliste laden
fetch('material_list_2026-03-29_16.54.28.txt')
    .then(res => res.text())
    .then(text => {
        const lines = text.split("\n");
        const out = document.getElementById("output");
        lines.forEach(line => {
            const item = parseLine(line);
            if(!item) return;

            const row = document.createElement("tr");

            // Zellen
            const nameCell = document.createElement("td");
            nameCell.textContent = item.name;
            const totalCell = document.createElement("td");
            totalCell.textContent = item.total;
            const stacksCell = document.createElement("td");
            stacksCell.textContent = getStacks(item.total);

            // Checkbox
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.style.width = "24px";
            checkbox.style.height = "24px";
            checkbox.addEventListener('change', () => {
                row.classList.toggle('selected', checkbox.checked);
            });
            const checkboxCell = document.createElement("td");
            checkboxCell.className = "checkbox-cell";
            checkboxCell.appendChild(checkbox);

            row.appendChild(nameCell);
            row.appendChild(totalCell);
            row.appendChild(stacksCell);
            row.appendChild(checkboxCell);

            out.appendChild(row);
        });
    })
    .catch(err => {
        console.error("Fehler beim Laden der Materialliste:", err);
    });
</script>

</body>
</html>
