<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Materialliste & Waypoints</title>
<link rel="icon" href="Knowledge_Book_JE2.png">
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #1e1e1e;
    color: #fff;
    margin: 0;
    padding: 0;
}
#header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #2a2a2a;
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 1000;
}
#menu-button {
    cursor: pointer;
    font-size: 24px;
    user-select: none;
}
#menu {
    position: absolute;
    top: 50px;
    right: 20px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 5px;
    display: none;
}
#menu div {
    padding: 8px 12px;
    cursor: pointer;
}
#menu div:hover {
    background-color: #00aa55;
}
#logo-container {
    display: flex;
    align-items: center;
}
#logo {
    width: 48px;
    height: 48px;
    margin-right: 10px;
}
#container {
    max-width: 1200px;
    margin: 20px auto;
    background: #2a2a2a;
    padding: 20px;
    border-radius: 8px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
th, td {
    padding: 8px;
    border-bottom: 1px solid #444;
    text-align: center;
}
th {
    background: #333;
}
tr:nth-child(even) {background-color: #2f3f2f;}
tr:nth-child(odd) {background-color: #3f4f3f;}
.completed {
    background-color: #225522 !important;
    color: #fff;
}
button.copy-btn {
    padding: 3px 6px;
    cursor: pointer;
    background-color: #00aa55;
    border: none;
    color: white;
    border-radius: 3px;
}
#progress-container {
    width: 100%;
    background: #444;
    border-radius: 5px;
    margin-bottom: 10px;
}
#progress-bar {
    height: 20px;
    width: 0;
    background: #00ff55;
    border-radius: 5px;
    text-align: center;
    line-height: 20px;
    color: #000;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="header">
    <div id="logo-container">
        <img id="logo" src="resized_1024_clock_00.png" alt="Uhr">
        <h2>Materialliste</h2>
    </div>
    <div id="menu-button">&#9776;</div>
    <div id="menu">
        <div onclick="showMaterialList()">Materialliste</div>
        <div onclick="showWaypoints()">Waypoints</div>
    </div>
</div>

<div id="container">
    <div id="progress-container">
        <div id="progress-bar">0%</div>
    </div>

    <div id="material-list">
        <table>
            <thead>
                <tr>
                    <th>✔</th>
                    <th>Item</th>
                    <th>Total</th>
                    <th>Stacks</th>
                </tr>
            </thead>
            <tbody id="output-material"></tbody>
        </table>
    </div>

    <div id="waypoints" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>X</th>
                    <th>Y</th>
                    <th>Z</th>
                    <th>Copy</th>
                </tr>
            </thead>
            <tbody id="output-waypoints"></tbody>
        </table>
    </div>
</div>

<script>
// ---------------------------
// MENU
// ---------------------------
const menuBtn = document.getElementById("menu-button");
const menu = document.getElementById("menu");
menuBtn.addEventListener("click", () => {
    menu.style.display = menu.style.display === "block" ? "none" : "block";
});

function showMaterialList(){
    document.getElementById("material-list").style.display = "block";
    document.getElementById("waypoints").style.display = "none";
}
function showWaypoints(){
    document.getElementById("material-list").style.display = "none";
    document.getElementById("waypoints").style.display = "block";
}

// ---------------------------
// ANIMIERTE UHR
// ---------------------------
let clockIndex = 0;
const clockFrames = [];
for(let i=0;i<=63;i++){
    clockFrames.push(`resized_1024_clock_${i.toString().padStart(2,'0')}.png`);
}
const logo = document.getElementById("logo");
function animateClock(){
    logo.src = clockFrames[clockIndex];
    clockIndex = (clockIndex+1)%clockFrames.length;
}
setInterval(animateClock, 66); // ~15 FPS

// ---------------------------
// MATERIALLISTE
// ---------------------------
function normalize(text){
    return text.toLowerCase().replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss").replace(/[^a-z0-9]/g,"");
}
function getStacks(total){
    const stacks = Math.floor(total/64);
    const rest = total % 64;
    if(stacks===0) return rest + " Blöcke";
    if(rest===0) return stacks + " Stacks";
    return stacks + " Stacks + " + rest;
}
function parseLine(line){
    const parts = line.split("|").map(p=>p.trim()).filter(p=>p);
    if(parts.length<2) return null;
    const name = parts[0];
    const total = parseInt(parts[1]);
    if(isNaN(total)) return null;
    return {name,total};
}
async function loadMaterialList(){
    const response = await fetch('material_list_2026-03-29_16.54.28.txt');
    const text = await response.text();
    const lines = text.split("\n");
    const output = document.getElementById("output-material");
    output.innerHTML="";
    let sumTotal=0;
    let sumOriginal=0;
    lines.forEach(line=>{
        const item = parseLine(line);
        if(!item) return;
        sumTotal+=item.total;
        sumOriginal+=item.total; // angenommen Original = gleiche Datei
        const row = document.createElement("tr");
        row.innerHTML = `<td><input type="checkbox" class="item-checkbox"></td>
                         <td>${item.name}</td>
                         <td>${item.total}</td>
                         <td>${getStacks(item.total)}</td>`;
        output.appendChild(row);
    });
    // Progressbar berechnen
    const progress = Math.round((sumTotal/sumOriginal)*100);
    const progressBar = document.getElementById("progress-bar");
    progressBar.style.width=progress+"%";
    progressBar.textContent=progress+"%";
}

// Checkboxen
document.addEventListener("change", e=>{
    if(e.target.classList.contains("item-checkbox")){
        if(e.target.checked){
            e.target.parentElement.parentElement.classList.add("completed");
        }else{
            e.target.parentElement.parentElement.classList.remove("completed");
        }
    }
});
loadMaterialList();

// ---------------------------
// WAYPOINTS
// ---------------------------
async function loadWaypoints(){
    const response = await fetch('waypoints.txt');
    const text = await response.text();
    const lines = text.split("\n");
    const output = document.getElementById("output-waypoints");
    output.innerHTML="";
    lines.forEach(line=>{
        if(!line.trim()) return;
        const [name,x,y,z] = line.split(",").map(p=>p.trim());
        const row = document.createElement("tr");
        row.innerHTML = `<td>${name}</td>
                         <td>${x}</td>
                         <td>${y}</td>
                         <td>${z}</td>
                         <td><button class="copy-btn" onclick="copyCoords('${x}','${y}','${z}')">Copy</button></td>`;
        output.appendChild(row);
    });
}
function copyCoords(x,y,z){
    navigator.clipboard.writeText(`X:${x} Y:${y} Z:${z}`);
}
loadWaypoints();

</script>
</body>
</html>
